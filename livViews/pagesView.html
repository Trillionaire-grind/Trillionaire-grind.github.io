<!DOCTYPE html>
<html lang="ht" class="liv-html-full">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <link rel="stylesheet" href="assets/styles.css">
        <title data-i18n="reader.title">Liv — Li paj</title>
    </head>
    <body class="liv-body liv-page-reader">
        <div class="liv-page liv-page-reader-inner">
            <header class="liv-reader-header">
                <h1 id="chapterTV" class="liv-reader-chapter-title"></h1>
            </header>

            <div class="liv-reader-stage">
                <button type="button" id="leftBtn" class="liv-reader-arrow liv-reader-arrow-left" data-i18n-aria="reader.prevPage">&#9664;</button>
                <article class="liv-book-surface">
                    <img id="pageImage" class="liv-reader-image" alt="" hidden>
                    <p id="contentTV" class="liv-reader-text"></p>
                    <p id="imageCaptionTV" class="liv-reader-image-caption" hidden></p>
                </article>
                <button type="button" id="rightBtn" class="liv-reader-arrow liv-reader-arrow-right" data-i18n-aria="reader.nextPage">&#9654;</button>
            </div>

            <footer class="liv-reader-footer">
                <p id="pageCounter" class="liv-page-counter"></p>
            </footer>
        </div>
    </body>
    <script type="module">
        import { initLivFirebase } from "./scripts/livFirebaseInit.js";
        import { collection, doc, getDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        import { initLivI18n, t, applyLivI18n } from "./scripts/livI18n.js";

        initLivI18n();
        applyLivI18n(document);

        const { db } = initLivFirebase();
        const leftBtn = document.getElementById("leftBtn");
        const rightBtn = document.getElementById("rightBtn");
        let pagePosition = 0;
        const chapterTV = document.getElementById("chapterTV");
        const pageCounter = document.getElementById("pageCounter");

        let pagesContent = [];
        let pageNames = [];
        let bookId = "";
        let chapterOrder = [];
        let currentChapterIndex = -1;

        function pageCounterLabel(current, total) {
            return t("reader.pageCounter")
                .replace("{current}", String(current))
                .replace("{total}", String(total));
        }

        async function getBookCollectionName(bookDocId) {
            const inBooks = await getDoc(doc(db, "books", bookDocId));
            if (inBooks.exists()) return "books";
            const inLegacy = await getDoc(doc(db, "Books", bookDocId));
            if (inLegacy.exists()) return "Books";
            return "books";
        }

        function extractNumber(pageString) {
            return parseInt(pageString.replace(/page\s*/i, "").trim(), 10) || 0;
        }

        function hasPrevChapter() {
            return currentChapterIndex > 0;
        }

        function hasNextChapter() {
            return currentChapterIndex >= 0 && currentChapterIndex < chapterOrder.length - 1;
        }

        async function navigateToChapter(chapterName, startPage) {
            const url = new URL(window.location.href);
            url.searchParams.set("id", bookId);
            url.searchParams.set("chapter", chapterName);
            history.replaceState(null, "", url.pathname + url.search + url.hash);
            await getPages(bookId, chapterName, startPage);
        }

        async function getPages(id, chapterName, startPage = "first") {
            bookId = id;
            const coll = await getBookCollectionName(id);

            const pageReference = collection(db, coll, id, "chapters", chapterName, "pages");
            const chaptersRef = collection(db, coll, id, "chapters");
            let chaptersSnap;
            try {
                const qCh = query(chaptersRef, orderBy("chapter_number", "asc"));
                chaptersSnap = await getDocs(qCh);
            } catch {
                chaptersSnap = await getDocs(chaptersRef);
            }

            chapterOrder = chaptersSnap.docs.map((d) => d.id);
            currentChapterIndex = chapterOrder.indexOf(chapterName);

            const chMetaSnap = await getDoc(doc(db, coll, id, "chapters", chapterName));
            const chapterTitle =
                chMetaSnap.exists() && chMetaSnap.data().chapter_name
                    ? String(chMetaSnap.data().chapter_name).trim()
                    : chapterName;

            const pageCollectionSnap = await getDocs(pageReference);

            chapterTV.textContent =
                currentChapterIndex >= 0
                    ? currentChapterIndex + 1 + ". " + chapterTitle
                    : chapterTitle;

            const pairs = [];
            pageCollectionSnap.forEach((docSnap) => {
                const data = docSnap.data() || {};
                pairs.push({
                    id: docSnap.id,
                    text: data.text || "",
                    imageUrl: data.imageUrl || "",
                    pageType: data.pageType || "text",
                });
            });

            pairs.sort((a, b) => extractNumber(a.id) - extractNumber(b.id));
            pageNames = pairs.map((p) => p.id);
            pagesContent = pairs;

            pagePosition = 0;
            if (pageNames.length === 0) {
                const contentTV = document.getElementById("contentTV");
                const pageImage = document.getElementById("pageImage");
                const imageCaptionTV = document.getElementById("imageCaptionTV");
                contentTV.hidden = false;
                contentTV.textContent = t("reader.noPages");
                pageImage.hidden = true;
                pageImage.removeAttribute("src");
                imageCaptionTV.hidden = true;
                imageCaptionTV.textContent = "";
                pageCounter.textContent = "";
                leftBtn.innerHTML = "&#9664;";
                rightBtn.innerHTML = "&#9654;";
                setArrowVisible(leftBtn, false);
                setArrowVisible(rightBtn, false);
                return;
            }

            const start =
                startPage === "last" ? Math.max(0, pageNames.length - 1) : 0;
            showPage(start);
        }

        function updateArrowContents(position, n) {
            const first = position === 0;
            const last = position === n - 1;

            if (first && hasPrevChapter()) {
                leftBtn.innerHTML =
                    '<span class="liv-arrow-stack"><span class="liv-arrow-chev" aria-hidden="true">◀</span><span class="liv-arrow-chapter-words">' +
                    t("reader.prevChapter") +
                    "</span></span>";
            } else if (position > 0) {
                leftBtn.innerHTML =
                    '<span class="liv-arrow-chev" aria-hidden="true">◀</span>';
            } else {
                leftBtn.innerHTML = "&#9664;";
            }

            if (last && hasNextChapter()) {
                rightBtn.innerHTML =
                    '<span class="liv-arrow-stack"><span class="liv-arrow-chev" aria-hidden="true">▶</span><span class="liv-arrow-chapter-words">' +
                    t("reader.nextChapter") +
                    "</span></span>";
            } else if (position < n - 1) {
                rightBtn.innerHTML =
                    '<span class="liv-arrow-chev" aria-hidden="true">▶</span>';
            } else {
                rightBtn.innerHTML = "&#9654;";
            }
        }

        function setArrowVisible(btn, visible) {
            btn.classList.toggle("liv-reader-arrow--off", !visible);
            btn.disabled = !visible;
            btn.setAttribute("aria-disabled", visible ? "false" : "true");
        }

        function showPage(position) {
            const contentTV = document.getElementById("contentTV");
            const n = pagesContent.length;
            if (n === 0) return;

            pageCounter.textContent = pageCounterLabel(position + 1, n);

            const first = position === 0;
            const last = position === n - 1;

            const canLeft = !first || (first && hasPrevChapter());
            const canRight = !last || (last && hasNextChapter());

            setArrowVisible(leftBtn, canLeft);
            setArrowVisible(rightBtn, canRight);

            if (first && hasPrevChapter()) {
                leftBtn.setAttribute("aria-label", t("reader.prevChapter"));
            } else {
                leftBtn.setAttribute("aria-label", t("reader.prevPage"));
            }
            if (last && hasNextChapter()) {
                rightBtn.setAttribute("aria-label", t("reader.nextChapter"));
            } else {
                rightBtn.setAttribute("aria-label", t("reader.nextPage"));
            }

            updateArrowContents(position, n);

            const page = pagesContent[position] || {};
            const textValue = typeof page.text === "string" ? page.text : "";
            const imageUrl = typeof page.imageUrl === "string" ? page.imageUrl : "";
            const pageType = page.pageType === "image" ? "image" : "text";
            const pageImage = document.getElementById("pageImage");
            const imageCaptionTV = document.getElementById("imageCaptionTV");

            if (pageType === "image" && imageUrl) {
                pageImage.src = imageUrl;
                pageImage.hidden = false;
                contentTV.hidden = true;
                imageCaptionTV.hidden = textValue.trim().length === 0;
                imageCaptionTV.textContent = textValue;
            } else {
                pageImage.hidden = true;
                pageImage.removeAttribute("src");
                contentTV.hidden = false;
                imageCaptionTV.hidden = true;
                imageCaptionTV.textContent = "";
                contentTV.textContent = textValue;
            }
            pagePosition = position;
        }

        leftBtn.addEventListener("click", async () => {
            if (pagePosition > 0) {
                showPage(pagePosition - 1);
                return;
            }
            if (pagePosition === 0 && hasPrevChapter()) {
                const prevName = chapterOrder[currentChapterIndex - 1];
                await navigateToChapter(prevName, "last");
            }
        });

        rightBtn.addEventListener("click", async () => {
            const n = pagesContent.length;
            if (pagePosition < n - 1) {
                showPage(pagePosition + 1);
                return;
            }
            if (pagePosition === n - 1 && hasNextChapter()) {
                const nextName = chapterOrder[currentChapterIndex + 1];
                await navigateToChapter(nextName, "first");
            }
        });

        function normalizeSearch(search) {
            let s = search || "";
            if (s.includes("?chapter=") && !s.includes("&chapter=")) {
                s = s.replace("?chapter=", "&chapter=");
            }
            return s;
        }

        function extractParamsFromUrl(href) {
            let search = "";
            try {
                const u = new URL(href, window.location.href);
                search = u.search;
            } catch {
                const m = href.match(/\?([^#]+)/);
                search = m ? "?" + m[1] : "";
            }
            search = normalizeSearch(search);
            const params = new URLSearchParams(search.startsWith("?") ? search.slice(1) : search);
            let id = params.get("id");
            let chapter = params.get("chapter");

            if (chapter == null && id != null && id.includes("?")) {
                const parts = id.split("?");
                id = parts[0];
                const rest = parts.slice(1).join("?");
                const cm = rest.match(/^chapter=(.+)$/);
                if (cm) chapter = decodeURIComponent(cm[1]);
            }

            if (id) id = decodeURIComponent(id);
            if (chapter) chapter = decodeURIComponent(chapter);

            if (id && chapter) {
                getPages(id, chapter, "first");
            } else {
                document.getElementById("contentTV").textContent = t("reader.badLink");
            }
        }

        extractParamsFromUrl(window.location.href);
    </script>
</html>
