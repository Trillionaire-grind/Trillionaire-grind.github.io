<!DOCTYPE html>
<html lang="ht">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Mèsi · Liv Lakay</title>
  <style>
    :root {
      --green: #2abf5b;
      --green-dark: #166534;
      --bg: #f0fdf4;
      --surface: #fff;
      --text: #0f172a;
      --muted: #4b5563;
      --radius: 16px;
      --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
      --max: 560px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.55;
      padding: 32px 16px 48px;
    }
    .thank-page { width: min(var(--max), 100%); margin: 0 auto; }
    .thank-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid #e5e7eb;
      border-left: 4px solid var(--green);
      padding: 32px 24px;
      text-align: center;
    }
    .thank-icon {
      width: 56px;
      height: 56px;
      margin: 0 auto 16px;
      border-radius: 50%;
      background: #dcfce7;
      color: var(--green-dark);
      display: grid;
      place-items: center;
      font-size: 28px;
      font-weight: 700;
    }
    .thank-eyebrow {
      margin: 0 0 8px;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--green-dark);
    }
    h1 { margin: 0 0 12px; font-size: 1.65rem; line-height: 1.2; }
    p { margin: 0 0 12px; color: var(--muted); font-size: 0.98rem; }
    .thank-actions {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      font-family: inherit;
      border: none;
      cursor: pointer;
    }
    .btn-primary { background: var(--green); color: #fff; }
    .btn-secondary {
      background: #fff;
      color: var(--green-dark);
      border: 2px solid var(--green);
    }
  </style>
</head>
<body>
  <div class="thank-page">
    <div class="thank-card">
      <div class="thank-icon" aria-hidden="true">✓</div>
      <p class="thank-eyebrow">Liv Lakay</p>
      <h1>Mèsi pou sipò ou!</h1>
      <p>Thank you for supporting Kreyòl education. Your gift helps put quality school books in students’ hands.</p>
      <p>N ap kontakte w si nou bezwen detay pou distribye kòd aksè oswa planifye deplwayman.</p>
      <div class="thank-actions">
        <a class="btn btn-primary" href="../liv.html">Retounen sou Liv Lakay</a>
        <a class="btn btn-secondary" href="livSupportView.html">Gade paj sipò a</a>
      </div>
    </div>
  </div>
</body>
</html>
