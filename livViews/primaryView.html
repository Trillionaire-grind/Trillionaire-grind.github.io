<!DOCTYPE html>
<html lang="ht" class="liv-shell-html">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <title>Liv Lakay</title>
        <style>
            .liv-shell-html,
            .liv-shell-html body {
                margin: 0;
                height: 100%;
                overflow: hidden;
                overscroll-behavior: none;
            }

            .liv-shell {
                display: flex;
                flex-direction: column;
                min-height: 100vh;
                min-height: 100dvh;
                max-height: 100vh;
                max-height: 100dvh;
                background-color: #f0f1f3;
            }

            .liv-shell-main {
                flex: 1 1 0;
                min-height: 0;
                position: relative;
                width: 100%;
                max-width: 1400px;
                margin: 0 auto;
            }

            /* Stack tabs with opacity instead of display:none so iframe layers stay
               composited — avoids a full repaint of heavy home/library on each switch. */
            .liv-shell-view {
                position: absolute;
                inset: 0;
                z-index: 0;
                opacity: 0;
                pointer-events: none;
            }

            .liv-shell-view.is-active {
                z-index: 1;
                opacity: 1;
                pointer-events: auto;
            }

            .liv-shell-view iframe {
                width: 100%;
                height: 100%;
                border: 0;
                display: block;
                vertical-align: top;
            }

            .liv-shell-footer {
                flex-shrink: 0;
                width: 100%;
                background-color: #fff;
                border-top: 1px solid #e8eaed;
                padding: 10px 0 calc(10px + env(safe-area-inset-bottom, 0px));
                box-sizing: border-box;
                position: relative;
                z-index: 10;
            }

            .liv-shell-footer nav {
                display: flex;
                justify-content: space-around;
                align-items: center;
            }

            .liv-shell-tab {
                appearance: none;
                -webkit-appearance: none;
                border: none;
                background: transparent;
                color: #333;
                display: flex;
                align-items: center;
                justify-content: center;
                min-width: 48px;
                min-height: 48px;
                padding: 8px 16px;
                margin: 0;
                cursor: pointer;
                touch-action: manipulation;
                -webkit-tap-highlight-color: transparent;
                user-select: none;
                -webkit-user-select: none;
            }

            .liv-shell-tab img {
                display: block;
                width: 24px;
                height: 24px;
                pointer-events: none;
            }

            @media (hover: hover) {
                .liv-shell-tab:hover {
                    color: #007bff;
                }
            }

            .liv-shell-tab:focus-visible {
                outline: 2px solid #2abf5b;
                outline-offset: 2px;
                border-radius: 8px;
            }
        </style>
    </head>
    <body class="liv-shell">
        <div class="liv-shell-main">
            <div class="liv-shell-view is-active" id="homeView">
                <iframe src="homeView.html" title="Akèy"></iframe>
            </div>
            <div class="liv-shell-view" id="libraryView">
                <iframe id="libraryIframe" src="libraryView.html" title="Bibliyotèk"></iframe>
            </div>
            <div class="liv-shell-view" id="profileView">
                <iframe src="profileView.html" title="Profil"></iframe>
            </div>
        </div>
        <footer class="liv-shell-footer">
            <nav aria-label="Main">
                <button type="button" class="liv-shell-tab" id="homeTabBtn" aria-label="Akèy" aria-current="page">
                    <img id="homeBtn" src="assets/house_g.svg" alt="" width="24" height="24">
                </button>
                <button type="button" class="liv-shell-tab" id="libraryTabBtn" aria-label="Bibliyotèk">
                    <img id="libraryBtn" src="assets/books.svg" alt="" width="24" height="24">
                </button>
                <button type="button" class="liv-shell-tab" id="profileTabBtn" aria-label="Profil">
                    <img id="profileBtn" src="assets/person.svg" alt="" width="24" height="24">
                </button>
            </nav>
        </footer>
    </body>
    <script>
        var homeView = document.getElementById("homeView");
        var libraryView = document.getElementById("libraryView");
        var profileView = document.getElementById("profileView");

        var views = [homeView, libraryView, profileView];

        function notifyLibraryFabSync() {
            var lib = document.getElementById("libraryIframe");
            if (lib && lib.contentWindow) {
                try {
                    lib.contentWindow.postMessage({ type: "liv-sync-fab" }, "*");
                } catch (e) {}
            }
        }

        function changeTo(destination) {
            views.forEach(function (view, index) {
                if (index === destination) {
                    view.classList.add("is-active");
                    view.setAttribute("aria-hidden", "false");
                } else {
                    view.classList.remove("is-active");
                    view.setAttribute("aria-hidden", "true");
                }
            });
            selectedBtn(destination);
            if (destination === 1) {
                requestAnimationFrame(function () {
                    notifyLibraryFabSync();
                });
            }
        }

        window.addEventListener("message", function (e) {
            if (e.data && e.data.type === "liv-admin-changed") {
                notifyLibraryFabSync();
            }
            if (e.data && e.data.type === "liv-tab" && typeof e.data.tab === "number") {
                changeTo(e.data.tab);
            }
        });

        function selectedBtn(destination) {
            var homeBtn = document.getElementById("homeBtn");
            var libraryBtn = document.getElementById("libraryBtn");
            var profileBtn = document.getElementById("profileBtn");
            var homeTabBtn = document.getElementById("homeTabBtn");
            var libraryTabBtn = document.getElementById("libraryTabBtn");
            var profileTabBtn = document.getElementById("profileTabBtn");

            homeBtn.src = "assets/house.svg";
            libraryBtn.src = "assets/books.svg";
            profileBtn.src = "assets/person.svg";

            homeTabBtn.setAttribute("aria-current", destination === 0 ? "page" : "false");
            libraryTabBtn.setAttribute("aria-current", destination === 1 ? "page" : "false");
            profileTabBtn.setAttribute("aria-current", destination === 2 ? "page" : "false");

            switch (destination) {
                case 0:
                    homeBtn.src = "assets/house_g.svg";
                    break;
                case 1:
                    libraryBtn.src = "assets/books_g.svg";
                    break;
                case 2:
                    profileBtn.src = "assets/person_g.svg";
                    break;
            }
        }

        document.getElementById("homeTabBtn").addEventListener("click", function () {
            changeTo(0);
        });
        document.getElementById("libraryTabBtn").addEventListener("click", function () {
            changeTo(1);
        });
        document.getElementById("profileTabBtn").addEventListener("click", function () {
            changeTo(2);
        });

        (function initTabFromUrl() {
            var q = new URLSearchParams(window.location.search);
            var t = q.get("tab");
            if (t === "1" || t === "library") {
                changeTo(1);
            } else if (t === "2" || t === "profile") {
                changeTo(2);
            } else {
                changeTo(0);
            }
        })();
    </script>
    <script type="module">
        import { initLivFirebase } from "./scripts/livFirebaseInit.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";

        const { auth } = initLivFirebase();
        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.replace("../liv.html");
            }
        });
    </script>
</html>
