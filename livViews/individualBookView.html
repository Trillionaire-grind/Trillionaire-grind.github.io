<!DOCTYPE html>
<html lang="ht" class="liv-html-doc">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
        <link rel="stylesheet" href="assets/styles.css">
        <title data-i18n="book.detailTitle">Liv — Detay liv</title>
    </head>
    <body class="liv-body">
        <div class="liv-page">
            <a class="liv-admin-back" id="livBackToApp" href="primaryView.html?tab=1" data-i18n="book.backLibrary">← Rete nan bibliyotèk</a>

            <div class="liv-book-cover-wrap">
                <img id="bookIV" class="liv-book-cover-img" src="" alt="">
            </div>

            <h1 class="liv-book-detail-title" id="bookTitleTV"></h1>

            <div class="liv-pin-row">
                <button type="button" id="livPinHomeBtn" class="liv-btn-pill" aria-pressed="false"></button>
            </div>

            <div class="liv-meta-grid" aria-label="Detay liv">
                <div class="liv-meta-cell">
                    <p class="liv-meta-label" data-i18n="meta.author">Ote</p>
                    <p class="liv-meta-value" id="authorTV"></p>
                </div>
                <div class="liv-meta-cell">
                    <p class="liv-meta-label" data-i18n="meta.subject">Sije</p>
                    <p class="liv-meta-value" id="subjectTV"></p>
                </div>
                <div class="liv-meta-cell">
                    <p class="liv-meta-label" data-i18n="meta.year">Ane</p>
                    <p class="liv-meta-value" id="yearTV"></p>
                </div>
            </div>

            <h2 class="liv-section-heading" data-i18n="book.content">Kontni</h2>
            <p class="liv-chapter-hint" data-i18n="book.chapterHint">Touche yon chapit pou li. Peze long pou modifye.</p>
            <div id="chaptersDiv"></div>
        </div>
    </body>

    <script type="module">
        import { initLivFirebase } from "./scripts/livFirebaseInit.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js";
        import {
            query,
            orderBy,
            collection,
            doc,
            getDocs,
            getDoc,
            onSnapshot,
        } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
        import { initLivI18n, t, applyLivI18n } from "./scripts/livI18n.js";
        import { isBookPinned, togglePinnedBook } from "./scripts/livPins.js";
        import { loadUserBookIds, toggleUserBookInFirestore } from "./scripts/livUserBooks.js";

        initLivI18n();

        (function setupBackToAppLink() {
            const back = document.getElementById("livBackToApp");
            if (!back) return;
            const from = new URLSearchParams(window.location.search).get("from");
            const tab = from === "home" ? 0 : 1;
            back.href = "primaryView.html?tab=" + tab;
            back.setAttribute("data-i18n", from === "home" ? "book.backHome" : "book.backLibrary");
            applyLivI18n(back);
        })();

        const { auth, db } = initLivFirebase();

        let myBookIds = new Set();

        const bookTitleTV = document.getElementById("bookTitleTV");
        const authorTV = document.getElementById("authorTV");
        const bookIV = document.getElementById("bookIV");
        const bookCoverWrap = document.querySelector(".liv-book-cover-wrap");
        const subjectTV = document.getElementById("subjectTV");
        const yearTV = document.getElementById("yearTV");

        let book = "";

        const livPinHomeBtn = document.getElementById("livPinHomeBtn");

        async function refreshMyBooksForCurrentBook() {
            if (!auth.currentUser || !book) {
                myBookIds = new Set();
            } else {
                myBookIds = await loadUserBookIds(db, auth.currentUser.uid);
            }
            syncPinButton();
        }

        let userBooksUnsub = null;

        onAuthStateChanged(auth, function (user) {
            if (userBooksUnsub) {
                userBooksUnsub();
                userBooksUnsub = null;
            }
            if (user && user.uid) {
                userBooksUnsub = onSnapshot(
                    doc(db, "users", user.uid),
                    function () {
                        refreshMyBooksForCurrentBook();
                    },
                    function (err) {
                        console.error(err);
                        refreshMyBooksForCurrentBook();
                    }
                );
            } else {
                refreshMyBooksForCurrentBook();
            }
        });

        function syncPinButton() {
            if (!livPinHomeBtn || !book) return;
            const on = auth.currentUser ? myBookIds.has(book) : isBookPinned(book);
            livPinHomeBtn.setAttribute("aria-pressed", on ? "true" : "false");
            livPinHomeBtn.textContent = on ? t("book.pinRemove") : t("book.pinAdd");
        }

        if (livPinHomeBtn) {
            livPinHomeBtn.addEventListener("click", async function () {
                if (!book) return;
                if (auth.currentUser) {
                    try {
                        const nowOn = await toggleUserBookInFirestore(db, auth.currentUser.uid, book);
                        if (nowOn) myBookIds.add(book);
                        else myBookIds.delete(book);
                    } catch (e) {
                        console.error(e);
                        await refreshMyBooksForCurrentBook();
                    }
                } else {
                    togglePinnedBook(book);
                }
                syncPinButton();
            });
        }

        window.addEventListener("storage", function (e) {
            if (e.key === "livPinnedBooks" || e.key === "livLang") syncPinButton();
        });

        function bindDetailCoverLoadState() {
            if (!bookCoverWrap || !bookIV) return;
            const finish = function () {
                bookCoverWrap.classList.remove("is-loading");
                bookIV.classList.add("is-loaded");
            };
            bookCoverWrap.classList.add("is-loading");
            bookIV.classList.remove("is-loaded");
            if (bookIV.complete && bookIV.naturalWidth > 0) {
                finish();
                return;
            }
            bookIV.addEventListener("load", finish, { once: true });
            bookIV.addEventListener("error", finish, { once: true });
        }

        async function getBook(id) {
            const chaptersDiv = document.getElementById("chaptersDiv");
            chaptersDiv.innerHTML = "";

            let bookSnapshot = await getDoc(doc(db, "books", id));
            let coll = "books";
            if (!bookSnapshot.exists()) {
                bookSnapshot = await getDoc(doc(db, "Books", id));
                coll = "Books";
            }

            const chaptersRef = collection(db, coll, id, "chapters");
            const q = query(chaptersRef, orderBy("chapter_number", "asc"));
            const chaptersSnapshot = await getDocs(q);

            if (bookSnapshot.exists()) {
                const d = bookSnapshot.data();
                bookTitleTV.textContent = d.bookTitle || "";
                authorTV.textContent = d.bookAuthor || "—";
                if (d.bookImg) {
                    bookIV.src = d.bookImg;
                    bindDetailCoverLoadState();
                } else {
                    bookIV.removeAttribute("src");
                    bookIV.classList.remove("is-loaded");
                    if (bookCoverWrap) bookCoverWrap.classList.remove("is-loading");
                }
                yearTV.textContent = d.bookYear || "—";
                subjectTV.textContent = d.bookSubject || "—";

                chaptersSnapshot.forEach((docSnap) => {
                    const cd = docSnap.data();
                    const label =
                        cd.chapter_name && String(cd.chapter_name).trim()
                            ? String(cd.chapter_name).trim()
                            : docSnap.id;
                    chaptersDiv.appendChild(
                        createChapterDiv(bookSnapshot.id, docSnap.id, label)
                    );
                });
                refreshMyBooksForCurrentBook();
            } else {
                bookTitleTV.textContent = t("search.noResults");
                authorTV.textContent = "—";
                yearTV.textContent = "—";
                subjectTV.textContent = "—";
                bookIV.removeAttribute("src");
                bookIV.classList.remove("is-loaded");
                if (bookCoverWrap) bookCoverWrap.classList.remove("is-loading");
                refreshMyBooksForCurrentBook();
            }
        }

        function extractParamsFromUrl(url) {
            let id;
            try {
                const u = new URL(url, window.location.href);
                id = u.searchParams.get("id");
            } catch (e) {
                /* fallback */
            }
            if (!id) {
                const qs = url.split("?")[1];
                if (!qs) return;
                const m = qs.match(/(?:^|&)id=([^&]*)/);
                id = m ? decodeURIComponent(m[1].replace(/\+/g, " ")) : "";
            }
            if (!id) return;
            book = id;
            syncPinButton();
            getBook(id);
        }

        extractParamsFromUrl(window.location.href);

        function createChapterDiv(bookId, chapterDocId, displayTitle) {
            const label =
                displayTitle != null && String(displayTitle).trim() !== ""
                    ? String(displayTitle).trim()
                    : chapterDocId;
            const div = document.createElement("div");
            div.className = "liv-chapter-item chapterDiv";
            div.dataset.speechId = bookId;
            const p = document.createElement("p");
            p.textContent = label;
            div.appendChild(p);
            div.addEventListener("click", () => openPage(bookId, chapterDocId));
            div.setAttribute("role", "button");
            div.setAttribute("tabindex", "0");
            div.addEventListener("keydown", (event) => {
                if (event.key === "Enter" || event.key === " ") {
                    event.preventDefault();
                    openPage(bookId, chapterDocId);
                }
            });

            return div;
        }

        function openPage(bookId, chapterName) {
            const url = "./pagesView.html?id=" + encodeURIComponent(bookId) + "&chapter=" + encodeURIComponent(chapterName);
            window.open(url, "_blank").focus();
        }
    </script>
</html>
