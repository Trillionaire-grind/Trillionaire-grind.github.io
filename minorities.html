<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Minorities</title>
        <style>
            /* General reset and basic styles */
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background-color: #F0F1F3;
                height: 100dvh;
                overflow: hidden;
            }
            .app-shell {
                height: calc(100dvh - 72px - env(safe-area-inset-bottom));
            }
            .view-frame {
                height: 100%;
                width: 100%;
                border: none;
                display: block;
            }
            footer {
                position: fixed;
                bottom: 0;
                width: 100%;
                text-align: center;
                padding: 8px 0 calc(8px + env(safe-area-inset-bottom));
                background-color: rgba(255, 255, 255, 0.95);
                border-top: 1px solid #e8e8e8;
                box-shadow: 0 -4px 16px rgba(0, 0, 0, 0.06);
                backdrop-filter: blur(8px);
                z-index: 1000;
            }
            .fab {
                position: fixed;
                bottom: 20px; /* Adjust as needed */
                right: 50%;
                background-color: #2ABF5B;
                color: white;
                width: 50px;
                height: 50px;
                border-radius: 50%;
                text-align: center;
                line-height: 50px;
                font-size: 24px;
                box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
                cursor: pointer;
                transform: translateX(50%);
            }
            footer nav {
                display: flex;
                justify-content: space-around;
                width: min(520px, 100%);
                margin: 0 auto;
            }
            footer nav a {
                text-decoration: none;
                color: #333;
                display: flex;
                flex-direction: column;
                align-items: center;
                min-width: 64px;
                padding: 6px 12px;
                border-radius: 10px;
                transition: background-color 0.15s, transform 0.15s;
            }
            footer nav a span {
                font-size: 10px;
                margin-top: 4px;
                color: #999;
            }
            footer nav a.active span {
                color: #AF2D0B;
                font-weight: bold;
            }
            footer nav a:hover {
                background-color: #f5f5f5;
            }
            footer nav a.active {
                background-color: #fff4f1;
                transform: translateY(-1px);
            }

            .card-container {
                display: flex;
                width: 90%;
                margin: 0 auto;
                flex-wrap: wrap;
            }
            .card {
                width: 45%;
                margin: 10px;
                background-color: white;
                border-radius: 6px;
                overflow: hidden;
                box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            }
            .card img {
                width: 100%;
                height: auto;
            }
            .card-content {
                padding: 10px;
            }

            @media (max-width: 768px) {
                .card {
                    width: 100%;
                }
            }
        </style>
    </head>
    <body>
        <div class="app-shell">
            <div id="homeView" style="display: inline; height: 100%; width: 100%;">
                <iframe src="minoritiesView/homeView.html" class="view-frame"></iframe>
            </div>
            <div id="chatView" style="display: none; height: 100%; width: 100%;">
                <iframe src="minoritiesView/chatView.html" class="view-frame"></iframe>
            </div>
            <div id="educationView" style="display: none; height: 100%; width: 100%;">
                <iframe src="minoritiesView/educationView.html" class="view-frame"></iframe>
            </div>
            <div id="shopView" style="display: none; height: 100%; width: 100%;">
                <iframe src="minoritiesView/shopView.html" class="view-frame"></iframe>
            </div>
        </div>
        <footer>
            <nav>
                <a href="#" id="navHome" onclick="changeTo(0); return false;" aria-label="Open Home">
                    <img id="homeBtn" src="minoritiesView/assets/house.svg" height="24px" width="24px">
                    <span>Home</span>
                </a>
                <a href="#" id="navChat" onclick="changeTo(1); return false;" aria-label="Open Chat">
                    <img id="chatBtn" src="minoritiesView/assets/message.svg" height="24px" width="24px">
                    <span>Chat</span>
                </a>
                <a href="#" id="navEducation" onclick="changeTo(2); return false;" aria-label="Open Learn">
                    <img id="educationBtn" src="minoritiesView/assets/graduation.svg" height="24px" width="24px">
                    <span>Learn</span>
                </a>
                <a href="#" id="navShop" onclick="changeTo(3); return false;" aria-label="Open Shop">
                    <img id="shopBtn" src="minoritiesView/assets/basket.svg" height="24px" width="24px">
                    <span>Shop</span>
                </a>
            </nav>
        </footer>
    </body>
    <script>
        var homeView = document.getElementById('homeView');
        var chatView = document.getElementById('chatView')
        var educationView = document.getElementById('educationView')
        var shopView = document.getElementById('shopView')

        let views = [homeView, chatView, educationView, shopView]
        function changeTo(destination)
        {
            views.forEach((view, index) => {
                if (index === destination) {
                    view.style.display = 'inline';
                } else {
                    view.style.display = 'none';
                }
            });
            selectedBtn(destination)
        }

        function selectedBtn(destination)
        {
            let homeBtn = document.getElementById("homeBtn")
            let chatBtn = document.getElementById("chatBtn")
            let educationBtn = document.getElementById("educationBtn")
            let shopBtn = document.getElementById("shopBtn")

            let navLinks = [
                document.getElementById("navHome"),
                document.getElementById("navChat"),
                document.getElementById("navEducation"),
                document.getElementById("navShop")
            ]

            homeBtn.src = "minoritiesView/assets/house.svg"
            chatBtn.src = "minoritiesView/assets/message.svg"
            educationBtn.src = "minoritiesView/assets/graduation.svg"
            shopBtn.src = "minoritiesView/assets/basket.svg"
            navLinks.forEach(link => link.classList.remove('active'))

            switch (destination){
                case 0:
                    homeBtn.src = "minoritiesView/assets/house_b.svg"
                    break
                case 1:
                    chatBtn.src = "minoritiesView/assets/message_b.svg"
                    break
                case 2:
                    educationBtn.src = "minoritiesView/assets/graduation_b.svg"
                    break
                case 3:
                    shopBtn.src = "minoritiesView/assets/basket_b.svg"
                    break
            }
            navLinks[destination].classList.add('active')
        }
        changeTo(0)
    </script>
</html>
