    function getDistanceInMiles(lat1, lon1, lat2, lon2) {
      const R = 3958.8; // Radius of the Earth in miles
      const toRad = (deg) => deg * (Math.PI / 180);

      const dLat = toRad(lat2 - lat1);
      const dLon = toRad(lon2 - lon1);

      const a =
        Math.sin(dLat / 2) ** 2 +
        Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
        Math.sin(dLon / 2) ** 2;

      const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));

      return R * c;
    }

    function areWithinOneMile(loc1, loc2) {
      const distance = getDistanceInMiles(
        loc1.latitude,
        loc1.longitude,
        loc2.latitude,
        loc2.longitude
      );

      return distance <= 1; // true if within 1 mile
    }

    function toJsDate(value) {
      if (!value) return null;
      if (typeof value.toDate === "function") return value.toDate();
      if (value instanceof Date) return value;
      if (typeof value.seconds === "number") return new Date(value.seconds * 1000);
      const parsed = new Date(value);
      return isNaN(parsed.getTime()) ? null : parsed;
    }

    function getLastContactDate(friend) {
      let latest = null;
      if (Array.isArray(friend.interactions)) {
        friend.interactions.forEach((item) => {
          const d = toJsDate(item.date);
          if (d && (!latest || d > latest)) latest = d;
        });
      }
      if (latest) return latest;
      return toJsDate(friend.createdAt);
    }

    function formatDaysAgo(date) {
      if (!date) return "no contact yet";
      const days = Math.floor((Date.now() - date.getTime()) / (1000 * 60 * 60 * 24));
      if (days <= 0) return "today";
      if (days === 1) return "1 day ago";
      return `${days} days ago`;
    }

    async function loadCrmLists(userId) {
      const friendsSnapshot = await getDocs(collection(db, `users/${userId}/friends`));
      const friends = friendsSnapshot.docs.map((d) => ({ id: d.id, ...d.data() }));

      const followUpList = document.getElementById("followUpList");
      const recentList = document.getElementById("recentList");
      followUpList.innerHTML = "";
      recentList.innerHTML = "";

      const followUps = friends
        .map((friend) => {
          const lastContact = getLastContactDate(friend);
          const days = lastContact
            ? Math.floor((Date.now() - lastContact.getTime()) / (1000 * 60 * 60 * 24))
            : FOLLOW_UP_DAYS + 1;
          return { ...friend, lastContact, days };
        })
        .filter((friend) => friend.days >= FOLLOW_UP_DAYS)
        .sort((a, b) => b.days - a.days);

      if (followUps.length < 1) {
        followUpList.innerHTML = `<p style="width: 100%; text-align: center; color: #555;">You're caught up — no follow-ups due.</p>`;
      } else {
        followUps.forEach((friend) => {
          const imageUrl = friend.imageUrl || "https://img.freepik.com/free-vector/blue-circle-with-white-user_78370-4707.jpg?semt=ais_hybrid&w=740&q=80";
          const factText = friend.funFact || "No fun fact yet";
          followUpList.innerHTML += `
            <div class="friend-card" onclick="window.location.href='newProfile.html?id=${friend.id}'">
              <img src="${imageUrl}" alt="User Profile Pic" class="avatar" />
              <div class="friend-info">
                <h2>${friend.name || "Friend"}</h2>
                <p>${factText}</p>
                <p>Last contact: ${formatDaysAgo(friend.lastContact)}</p>
              </div>
            </div>`;
        });
      }

      const recentItems = [];
      friends.forEach((friend) => {
        if (!Array.isArray(friend.interactions)) return;
        friend.interactions.forEach((item) => {
          const date = toJsDate(item.date);
          if (!date) return;
          recentItems.push({
            friendId: friend.id,
            friendName: friend.name || "Friend",
            title: item.title || "Interaction",
            notes: item.notes || "",
            date
          });
        });
      });

      recentItems.sort((a, b) => b.date - a.date);
      const topRecent = recentItems.slice(0, 10);

      if (topRecent.length < 1) {
        recentList.innerHTML = `<p style="width: 100%; text-align: center; color: #555;">No interactions yet. Open a friend and tap Add Interaction.</p>`;
      } else {
        topRecent.forEach((item) => {
          const dateLabel = `${item.date.getFullYear()}-${item.date.getMonth() + 1}-${item.date.getDate()}`;
          recentList.innerHTML += `
            <div class="friend-card" onclick="window.location.href='newProfile.html?id=${item.friendId}'">
              <div class="friend-info" style="margin-left: 0;">
                <h2>${item.friendName}</h2>
                <p>${dateLabel} — ${item.title}</p>
                <p>${item.notes ? item.notes : ""}</p>
              </div>
            </div>`;
        });
      }
    }

    function generatePrefixTokens(str) {
      const tokens = new Set();

      const full = `${str}`.toLowerCase().trim();
      const words = full.split(/\s+/);

      // 1. Prefixes for each individual word
      for (const word of words) {
        let prefix = "";
        for (let i = 0; i < word.length; i++) {
          prefix += word[i];
          tokens.add(prefix);
        }
      }

      // 2. Prefixes for the full string with spaces removed (cross-word search)
      const noSpace = full.replace(/\s+/g, "");
      let prefix = "";
      for (let i = 0; i < noSpace.length; i++) {
        prefix += noSpace[i];
        tokens.add(prefix);
      }

      return Array.from(tokens);
    }

    function generateSearchIndex(name, funFact) {
      const combined = `${name} ${funFact}`.trim();
      return generatePrefixTokens(combined);
    }

    function getCurrentLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          resolve(null); // just return null if unsupported
        } else {
          navigator.geolocation.getCurrentPosition(
            (position) => resolve({
              latitude: position.coords.latitude,
              longitude: position.coords.longitude
            }),
            (err) => {
              console.error("Geolocation error:", err);
              resolve(null); // don't block saving friend
            }
          );
        }
      });
    }

    async function addFriend(name, fact, email, phone, group, picture) {
      try {
        const location = await getCurrentLocation();
        const currentUser = auth.currentUser;

        let groupArray = null;
        if (group && group.length > 1) {
          groupArray = group.split(",");
        }

        // 1️⃣ Create friend first
        const docRef = await addDoc(
          collection(db, `users/${currentUser.uid}/friends`),
          {
            name,
            funFact: fact,
            email,
            phone,
            group: groupArray,
            searchIndex: generateSearchIndex(name, fact),
            imageUrl: null,
            location,
            createdAt: new Date()
          }
        );

        const friendId = docRef.id;

        // 2️⃣ Handle image safely
        if (picture) {
          let safeFile = normalizeImageFile(picture);

          // Guard: Android sometimes gives empty type
          if (!safeFile.type || !safeFile.type.startsWith("image/")) {
            throw new Error("Selected file is not an image");
          }

          // Resize BEFORE upload (Android fix)
          safeFile = await resizeImage(safeFile);

          const storageRef = ref(
            storage,
            `users/${currentUser.uid}/friends/${friendId}/profile.jpg`
          );

          const snapshot = await uploadBytes(storageRef, safeFile);
          const downloadURL = await getDownloadURL(snapshot.ref);

          await updateDoc(doc(db, `users/${currentUser.uid}/friends/${friendId}`), {
            imageUrl: downloadURL
          });
        }

        alert("Friend added successfully!");
        fetchFriends(auth.currentUser.uid)
        loadCrmLists(auth.currentUser.uid)

        closeAddFriend();

      } catch (err) {
        console.error("Error adding friend:", err);
        alert(`Could not add friend: ${err.message || err}`);
      }
    }

    function normalizeImageFile(file) {
      if (!file) return null;

      // Android camera may return Blob instead of File
      if (file instanceof File) return file;

      return new File([file], "photo.jpg", { type: "image/jpeg" });
    }

    async function resizeImage(file, maxSize = 1280) {
      return new Promise((resolve) => {
        const img = new Image();
        const reader = new FileReader();

        reader.onload = e => img.src = e.target.result;

        img.onload = () => {
          const canvas = document.createElement("canvas");
          const scale = Math.min(
            maxSize / img.width,
            maxSize / img.height,
            1
          );

          canvas.width = img.width * scale;
          canvas.height = img.height * scale;

          const ctx = canvas.getContext("2d");
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          canvas.toBlob(
            blob => {
              resolve(
                new File([blob], file.name || "photo.jpg", {
                  type: "image/jpeg"
                })
              );
            },
            "image/jpeg",
            0.85
          );
        };

        reader.readAsDataURL(file);
      });
    }


    async function fetchFriends(userId) {
      const friendsRef = collection(db, `users/${userId}/friends`)
      const first = query(friendsRef, orderBy("name"), limit(50))
      const documentSnapshots = await getDocs(first);

      const friendListDiv = document.getElementById("friendList");
      friendListDiv.innerHTML = "";
      if (documentSnapshots.empty) {
        friendListDiv.innerHTML = `<p style="text-align:center; color:#555; margin-top:1rem;">No friends yet. Tap + New Friend to add one.</p>`;
        return;
      }
      documentSnapshots.forEach((doc) => {
        let name = doc.data().name
        let imageUrl = doc.data().imageUrl
        let funFact = doc.data().funFact
        let id = doc.id
        updateDiv(name, funFact, imageUrl, id)
      })
    }

    let timer;

    searchFriendsInput.addEventListener("input", (e) => {
      const value = e.target.value.trim();

      clearTimeout(timer);
      timer = setTimeout(async () => {
        if (!auth.currentUser) return;
        if (value === "") {
          fetchFriends(auth.currentUser.uid)
        } else {
          const results = await searchFriends(value);
          renderFriends(results);
        }
      }, 200);
    });

    const saveFriendBtn = document.getElementById("saveFriendBtn");
    saveFriendBtn.onclick = () => {
      const name = document.getElementById('friendName').value.trim();
      const fact = document.getElementById('friendFact').value.trim();
      const email = document.getElementById('friendEmail').value.trim();
      const phone = document.getElementById('friendPhone').value.trim();
      const group = document.getElementById('friendGroup').value.trim();
      const picture = document.getElementById('friendPic').files[0];


      if (!name || !fact) {
        alert('please include a name and fun fact')
        return;
      }

      addFriend(name, fact, email, phone, group, picture)
    }


    async function searchFriends(searchTerm) {
      const q = searchTerm.toLowerCase().trim();
      if (!q || !auth.currentUser) return [];

      const friendsRef = collection(db, `users/${auth.currentUser.uid}/friends`);
      const qRef = query(friendsRef, where("searchIndex", "array-contains", q));
      const snapshot = await getDocs(qRef);
      let results = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));

      // Fallback for older friends missing searchIndex
      if (results.length === 0) {
        const allSnap = await getDocs(friendsRef);
        results = allSnap.docs
          .map(doc => ({ id: doc.id, ...doc.data() }))
          .filter((friend) => {
            const name = (friend.name || "").toLowerCase();
            const fact = (friend.funFact || "").toLowerCase();
            return name.includes(q) || fact.includes(q) || name.replace(/\s+/g, "").includes(q);
          });
      }

      return results;
    }

    async function getNearbyFriends(userId, maxMiles, userLat, userLong) {
      const friendsSnapshot = await getDocs(collection(db, `users/${userId}/friends`));

      const nearby = [];

      friendsSnapshot.forEach(doc => {
        const friend = doc.data();
        if (!friend.location) return;

        /*const distance = getDistanceInMiles(
            friend.location.latitude,
            friend.location.longitude,
            currentUserLocation.latitude,
            currentUserLocation.longitude
        );*/
        const distance = getDistanceInMiles(
          friend.location.latitude,
          friend.location.longitude,
          userLat,
          userLong
        );


        if (distance <= maxMiles) {
          nearby.push({ id: doc.id, ...friend, distance });
        }
      });

      return nearby;
    }


    async function showNearby(userId) {
      const nearbyFriends = await getNearbyFriends(`${userId}`, 1)
      renderNear(nearbyFriends)
    }

    function renderNear(friends) {
      const nearList = document.getElementById("nearList");
      nearList.innerHTML = ""; // Clear previous results

      if(friends.length < 1){
        nearList.innerHTML = `<p style="width: 100%; text-align: center"> No Friends Nearby </p>`
      }else{
        friends.forEach(friend => {
        let { name, funFact, imageUrl, id } = friend;

        if (!imageUrl) {
          imageUrl = "https://img.freepik.com/free-vector/blue-circle-with-white-user_78370-4707.jpg?semt=ais_hybrid&w=740&q=80";
        }

        const factText = funFact || "No fun fact yet";
        let cardHTML = `
                    <div class="friend-card" onclick="window.location.href='newProfile.html?id=${id}'">
                        <img src="${imageUrl}" alt="User Profile Pic" class="avatar" />
                        <div class="friend-info">
                            <h2>${name}</h2>
                            <p>${factText}</p>
                        </div>
                    </div>
                `;

        nearList.innerHTML += cardHTML;});
      }
      
    }

    onAuthStateChanged(auth, (user) => {
      if (!user) {
        window.location.href = "../winFriends.html";
        return;
      }
      else {
        fetchFriends(user.uid);
        loadCrmLists(user.uid);
      }
    });
    //getCurrentUser()
  </script>
