<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="theme-color" content="#ff003c">
        <meta name="description" content="Face recognition and navigation app for AR glasses">
        <title>AR Glasses App</title>
        <script>
            (function () {
                var t = localStorage.getItem('jakov-theme');
                document.documentElement.setAttribute('data-theme', (t === 'dark' || t === 'light') ? t : 'light');
            })();
        </script>
        <style>
            #video { display: none !important; }
        </style>
        <script>
            // Ensure we aren't stuck with an older cached UI when iterating quickly.
            // Only runs once per reload (guarded by `sw-unreg=1`).
            (async () => {
                try {
                    const url = new URL(window.location.href);
                    if (url.searchParams.get('sw-unreg') === '1') return;
                    if (!('serviceWorker' in navigator)) return;
                    const regs = await navigator.serviceWorker.getRegistrations();
                    await Promise.all(regs.map(r => r.unregister()));
                    url.searchParams.set('sw-unreg', '1');
                    window.location.replace(url.toString());
                } catch (e) {
                    // Ignore if service workers aren't available/allowed.
                }
            })();
        </script>
        <link rel="manifest" href="manifest.json">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Anton&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="glasses.css?v=8">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
        <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.css" />
    </head>
    <body>
        <video id="video" autoplay muted playsinline style="display:none;"></video>
        <canvas id="face-canvas" style="background: transparent;"></canvas>
        
        <div id="tasks">
            <div class="task">
                <div class="circle"></div>
                <span>Task 1</span>
            </div>
            <div class="task">
                <div class="circle"></div>
                <span>Task 2</span>
            </div>
            <div class="task">
                <div class="circle"></div>
                <span>Task 3</span>
            </div>
        </div>
        
        <div id="comic-text" class="hidden">
            <button id="close-text" class="close-btn">×</button>
            This is a comic book style text popup!
        </div>
        
        <div id="text-badge">!</div>
        
        <div id="minimap"></div>

        <div id="compass">
            <div class="compass-ring">
                <div class="compass-arrow"></div>
                <div class="compass-label north">N</div>
                <div class="compass-label east">E</div>
                <div class="compass-label south">S</div>
                <div class="compass-label west">W</div>
            </div>
            <div id="compass-distance">--</div>
        </div>

        <div id="destination-ui">
            <input id="destination" class="destination-input" type="text" placeholder="Enter destination">
            <button id="search" class="destination-btn">Go</button>
            <div id="destination-results" class="destination-results"></div>
        </div>

        <div id="datetime"></div>

        <button type="button" id="theme-toggle" class="theme-toggle" aria-pressed="false" aria-label="Switch color theme">Dark</button>

        <div id="task-tracker">
            <div class="tracker-header">TASKS</div>
            <div class="tracker-list">
                <div class="tracker-task">
                    <div class="task-time">09:00</div>
                    <div class="task-info">
                        <div class="task-name">Morning Briefing</div>
                        <div class="task-duration">30 min</div>
                    </div>
                </div>
                <div class="tracker-task">
                    <div class="task-time">11:30</div>
                    <div class="task-info">
                        <div class="task-name">Review Code</div>
                        <div class="task-duration">45 min</div>
                    </div>
                </div>
                <div class="tracker-task">
                    <div class="task-time">13:00</div>
                    <div class="task-info">
                        <div class="task-name">Team Meeting</div>
                        <div class="task-duration">1 hour</div>
                    </div>
                </div>
                <div class="tracker-task">
                    <div class="task-time">15:30</div>
                    <div class="task-info">
                        <div class="task-name">Deploy Update</div>
                        <div class="task-duration">20 min</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- Face Recognition Modal -->
        <div id="face-modal" class="modal hidden">
            <div class="modal-content">
                <span class="close-modal">&times;</span>
                <h2>Unknown Person Detected</h2>
                <p>Would you like to save this person's face?</p>
                <input type="text" id="face-name-input" placeholder="Enter name" />
                <button id="save-face-btn">Save Face</button>
                <button id="skip-face-btn">Skip</button>
            </div>
        </div>
        
        <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
        <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>
        <script src="glasses.js"></script>
    </body>
</html>
