<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arcadia | Ethereal Shadow</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300&family=Montserrat:wght@100&display=swap" rel="stylesheet">
    <style>
        :root {
            --white: #ffffff;
            --gold: #c5a059;
            --black: #050505;
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: var(--black);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            color: var(--white);
        }

        /* High-End Image Viewer */
        #gallery-canvas {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-color: var(--black);
            z-index: 1;
            opacity: 1;
            transition: transform 2s cubic-bezier(0.16, 1, 0.3, 1), opacity 1.2s ease;
        }

        /* Soft Gradient Scrim */
        .scrim {
            position: absolute;
            inset: 0;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), transparent, rgba(0,0,0,0.8));
            z-index: 2;
        }

        /* Refined Title - Less Prominent */
        .header {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }

        h1 {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.5rem, 4vw, 2.5rem); /* Scaled down significantly */
            font-weight: 300;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 12px;
            opacity: 0.6; /* Softer presence */
            transition: letter-spacing 1.5s ease, opacity 1s ease;
        }

        /* Bottom Navigation */
        .nav-container {
            position: absolute;
            bottom: 60px;
            width: 100%;
            display: flex;
            justify-content: center;
            gap: 80px;
            z-index: 20;
        }

        button {
            background: none;
            border: none;
            color: var(--white);
            font-size: 0.6rem;
            letter-spacing: 4px;
            cursor: pointer;
            opacity: 0.4;
            transition: 0.5s;
            padding: 10px;
        }

        button:hover {
            opacity: 1;
            color: var(--gold);
        }

        /* Refresh Effect */
        .fade-out {
            opacity: 0 !important;
            transform: scale(1.03);
            letter-spacing: 20px !important;
        }
    </style>
</head>
<body>

    <div id="gallery-canvas"></div>
    <div class="scrim"></div>

    <div class="header">
        <h1 id="headline">Arcadia Droptail</h1>
    </div>

    <nav class="nav-container">
        <button onclick="handleAction('repeat')">REPEAT</button>
        <button onclick="handleAction('next')">NEXT</button>
    </nav>

    <script>
        const folder = "arcadia";
        const baseName = "arcadia_";
        const ext = ".webp";
        const IMAGE_IDS = [1, 2, 3, 4, 5, 6, 7, 8, 10, 11, 13, 14, 15, 16, 17];
        const AUTOPLAY_MS = 7000;
        const FADE_MS = 800;

        let validImages = [];
        let lastIndex = -1;
        let autoplayTimer = null;
        let transitioning = false;

        const canvas = document.getElementById("gallery-canvas");
        const title = document.getElementById("headline");

        function imageUrl(id) {
            return folder + "/" + baseName + id + ext;
        }

        function preloadImages(ids, done) {
            const loaded = [];
            let pending = ids.length;
            if (!pending) {
                done([]);
                return;
            }
            ids.forEach(function (id) {
                const img = new Image();
                img.onload = function () {
                    loaded.push(id);
                    pending -= 1;
                    if (pending === 0) done(loaded.sort(function (a, b) { return a - b; }));
                };
                img.onerror = function () {
                    console.warn("Arcadia: skipped missing image", id);
                    pending -= 1;
                    if (pending === 0) done(loaded.sort(function (a, b) { return a - b; }));
                };
                img.src = imageUrl(id);
            });
        }

        function pickNextIndex(type) {
            if (!validImages.length) return -1;
            if (type === "repeat") {
                return lastIndex >= 0 ? lastIndex : validImages[0];
            }
            if (validImages.length === 1) return validImages[0];
            let next;
            do {
                next = validImages[Math.floor(Math.random() * validImages.length)];
            } while (next === lastIndex);
            return next;
        }

        function showImage(id, animate) {
            if (id < 0) return;
            const apply = function () {
                canvas.style.backgroundImage = "url('" + imageUrl(id) + "')";
                lastIndex = id;
                if (animate) {
                    canvas.classList.remove("fade-out");
                    title.classList.remove("fade-out");
                }
                transitioning = false;
            };

            if (!animate) {
                apply();
                return;
            }

            transitioning = true;
            canvas.classList.add("fade-out");
            title.classList.add("fade-out");
            setTimeout(apply, FADE_MS);
        }

        function handleAction(type) {
            if (!validImages.length || transitioning) return;
            const nextIndex = pickNextIndex(type);
            showImage(nextIndex, lastIndex >= 0);
            restartAutoplay();
        }

        function restartAutoplay() {
            clearInterval(autoplayTimer);
            autoplayTimer = setInterval(function () {
                handleAction("next");
            }, AUTOPLAY_MS);
        }

        preloadImages(IMAGE_IDS, function (loaded) {
            validImages = loaded;
            if (!validImages.length) return;
            showImage(validImages[Math.floor(Math.random() * validImages.length)], false);
            restartAutoplay();
        });
    </script>
</body>
</html>
