<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Green Books App - Home</title>
  <link rel="shortcut icon" type="image/x-icon" href="assets/gba_logo.png"/>
  <link rel="stylesheet" href="styles/mainView.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
  <script type="module" src="scripts/mainView.js"></script>

</head>

<body id="mainFrame">

  <main>
    <div class="modal-overlay" id="listBookModal">
      <div class="modal">
        <h2>List Your Book</h2>

        <label>Course</label><br>
        <input style="width: 50%;" type="text" id="courseET" required placeholder="e.g., MATH2020"><br>

        <label>Title</label>
        <input type="text" id="titleET" required placeholder="e.g., Intro To Collge Algebra">
        <label>Author</label>
        <input type="text" id="authorET" required placeholder="e.g., Matthew Milt">

        <div style="display: flex; margin-bottom: 0px;">
          <div style="width: 50%;">
            <label>Quality</label><br>
          <!--<input type="text" id="qualityET" required placeholder="">-->
          <select id="qualityET" required>
            <option value="" disabled selected>Select condition</option>
            <option value="NEW">New</option>
            <option value="LIKE_NEW">Like New</option>
            <option value="GOOD">Good</option>
            <option value="FAIR">Fair</option>
            <option value="POOR">Poor</option>
          </select>
          </div>
          <div style="width: 40%; margin-left: auto;">
            <label>Price</label><br>
            <div class="price-input">
              <span class="currency">$</span>
              <input
                type="number"
                id="priceET"
                min="0"
                step="0.01"
                placeholder="0.00"
                required
              />
            </div>
            <!--<input type="text" id="priceET" required placeholder="e.g., $45">-->
          </div>
        </div>
        <p id="availabilityTV" >Your Availability</p>
          <!--Availability<br>(max 4)</p>-->
        <div id="availabilityDiv">
          <div style="display: flex; align-items: center;">
            <p style="background-color: #39B053; width: 20px; color: white; padding: 8px;margin-top: 2px; margin-bottom: 2px; text-align: center;">M</p>
            <div class="tags">
              <span class="tag">10 AM</span>
              <span class="tag">1 PM</span>
              <span class="tag">4 PM</span>
              <span class="tag">6 PM</span>
            </div>
          </div>
          <div style="display: flex; align-items: center;">
            <p style="background-color: #39B053; width: 20px; color: white; padding: 8px;margin-top: 2px; margin-bottom: 2px; text-align: center;">T</p>
            <div class="tags">
              <span class="tag">10 AM</span>
              <span class="tag">1 PM</span>
              <span class="tag">4 PM</span>
              <span class="tag">6 PM</span>
            </div>
          </div>
          <div style="display: flex; align-items: center;">
            <p style="background-color: #39B053; width: 20px; color: white; padding: 8px;margin-top: 2px; margin-bottom: 2px; text-align: center;">W</p>
            <div class="tags">
              <span class="tag">10 AM</span>
              <span class="tag">1 PM</span>
              <span class="tag">4 PM</span>
              <span class="tag">6 PM</span>
            </div>
          </div>
          <div style="display: flex; align-items: center; margin-top: 0px; margin-bottom: 0px;">
            <p style="background-color: #39B053; width: 20px; color: white; padding: 8px;margin-top: 2px; margin-bottom: 2px; text-align: center;">Th</p>
            <div class="tags">
              <span class="tag">10 AM</span>
              <span class="tag">1 PM</span>
              <span class="tag">4 PM</span>
              <span class="tag">6 PM</span>
            </div>
          </div>
          <div style="display: flex; align-items: center; margin-top: 0px; margin-bottom: 0px;">
            <p style="background-color: #39B053; width: 20px; color: white; padding: 8px;margin-top: 2px; margin-bottom: 2px; text-align: center;">F</p>
            <div class="tags">
              <span class="tag">10 AM</span>
              <span class="tag">1 PM</span>
              <span class="tag">4 PM</span>
              <span class="tag">6 PM</span>
            </div>
          </div>

        </div>

        <div class="modal-buttons">
          <button id="cancelListBtn" type="button">Cancel</button>
          <button id="sellListBtn" style="background-color: #39B053; color: white;" type="button">Sell</button>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="scheduleModal">
      <div class="modal" style="background-color: #39B053;">
        <h2 style="color: white;">Your Schedule</h2>
        <div id="scheduleDiv"></div>
        <button style="background-color: white; color: #39B053; width: 80%; display: block;
        margin: 16px auto; margin-top: 32px; " id="addCourseBtn">Add Course</button>

        <div style="margin-top: 32px;" class="modal-buttons">
          <button id="scheduleCancelBtn" style="background-color: white; color: black;"  type="button">Cancel</button>
          <button id="scheduleUpdateBtn" style="background-color: black; color: white;" type="button">Update</button>
        </div>
      </div>
    </div>
    <div class="modal-overlay" id="addCourseModal" >
      <div class="modal">
        <div class="modal-content" style="padding-bottom: 64px;">
          <label style="color: #39B053; text-align: left; ">Course</label>
          <input type="text" id="addCourseET" style="background-color: #d9f3e3; margin-top: 16px;" placeholder="ex. ENC1010"><br>
          <div style="float: right; margin-top: 8px; display: flex;">
              <button id="addCancelBtn" style="background-color: #fff; color: #000; border: none; margin-left: auto; padding: 8px; cursor: pointer;">Cancel</button>
              <button id="addAddBtn" style="background-color: #39B053; color: white; padding: 8px; cursor: pointer; border-radius: 10px; border: none;">Add</button>
          </div>
      </div>
      </div>
    </div>


    <section id="transactions"  style="margin-bottom: 64px;">
      <div id="transactionsDiv">
        
      </div>
    
    </section>

    <section id="home">
      <div id="scheduleViewer">
        
      </div>
      <button class="fab" id="fab">
        <span class="material-symbols-outlined">attach_money</span>
      </button>
    </section>

    <section id="account">
      <p style="color: #39B053; font-size: 32px;">Hi, <span id="studentNameTV"></span> welcome to <br>Green Books!</p>
      <p style="color: #39B053; margin-top: 32px;">What would you like us to help you with?</p>
      <div style="margin-top: 48px;">
        <button id="scheduleBtn" class="accountButton">Schedule</button>
      </div>
      
      <div>
        <button id="signOutBtn" class="accountButton">Sign Out</button>
      </div>
    </section>
  </main>

  <footer>
    <nav>
      <a href="#transactions" class="nav-link" style="font-size: 14px; margin-top: 8px;"><span
          class="material-symbols-outlined">
          receipt</span>Transactions</a>
      <a href="#home" class="nav-link active-link"> <span class="material-symbols-outlined">
          home</span> Home</a>
      <a href="#account" class="nav-link"><span style="margin-left: auto; margin-right: auto;"
          class="material-symbols-outlined">person</span>Account</a>

    </nav>
  </footer>
</body>

</html>
