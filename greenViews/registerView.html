<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Green Books App - Register</title>
    <link rel="shortcut icon" type="image/x-icon" href="logo.png" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="styles/registerView.css">
    <script type="module" src="scripts/registerView.js"></script>

  </head>

  <body>
    <a style="color: black;text-decoration: none;" href="../greenBooks.html" target="_self">&larr; back</a>
 
    <p style="width: 100%; text-align: center; background-color: #f9f9f9; padding-left: 0px;margin-top: 0px; padding: 8px; font-size: 32px; color: #39B053
    ;">Register</p>

    <main>
      <div>
        <p id="sectionName" style="width: 100%; margin-left: 5%; margin-bottom: 0px;">Id</p>
        <div id="registerForm">
            <div id="firstSectionDiv" style="display: flex;">
                <div style="width: 20%; height: 100px; margin: 8px; background-color: #000;">

                </div>
                <div style="width: 76%; margin: 8px;">
                    <input class="inputField" style="margin-top: 8px; margin-right: 8px;"  type="text" id="nameET" required placeholder="name..."><br>
                    <input class="inputField" style="margin-top: 8px; margin-right: 8px;" type="email" id="emailET" required placeholder="email..."><br>
                    <input class="inputField" style="margin-top: 8px;margin-right: 8px; " type="password" id="passwordET" required placeholder="password..."><br>
                    <button id="createLogInBtn">Create Log-In</button>
                </div>
            </div>
            <div id="secondSectionDiv" 
            style=" display: none;
            flex-direction: column;
            gap: 8px;
            padding-top: 1px;
            padding-bottom: 8px;">
                <div id="scheduleDiv"></div>
                <button id="addCourseBtn">Add Course</button>
                <button id="saveScheduleBtn">Save Schedule</button>
            </div>
           
            <div id="addCourseModal" class="modal">
              <div class="modal-content" style="padding-bottom: 64px;">
                  <label style="color: #39B053; text-align: left; ">Course</label>
                  <input type="text" id="courseET" style="background-color: #d9f3e3; margin-top: 16px;" placeholder="ex. ENC1010"><br>
                  <div style="float: right; margin-top: 8px; display: flex;">
                      <button id="addCancelBtn" style="background-color: #fff; color: #000; border: none; margin-left: auto; padding: 8px; cursor: pointer;">Cancel</button>
                      <button id="addSendBtn" style="background-color: #39B053; color: white; padding: 8px; cursor: pointer; border-radius: 10px; border: none;">Okay</button>
                  </div>
              </div>
          </div>
        </div>
      </section>
      
    </main>
    <script type="module">
      // Firebase SDK and login code
      // Import the functions you need from the SDKs you need
      
  </script>
  </body>
</html>
