<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Green Books App - Books</title>
        <link rel="shortcut icon" type="image/x-icon" href="assets/gba_logo.png"/>
        <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
        <link rel="stylesheet" href="styles/lisitedBooks.css">
        <script type="module" src="scripts/listedBooks.js"></script>
    </head>
    <body>
        <main>
            <div id="confirmModal" class="modal-overlay hidden">
                <div class="modal-card">
                    <h3>Confirm meeting with...<span id="sellerTV"></span></h3>

                    <p ><strong>Book Title:</strong> <span id="modalBookTitle"></span></p>
                    <div style="display: flex; margin-bottom: 0px; padding-top: 0px;">
                        <p><strong>Author:</strong> <span id="authorTV"></span></p>
                        <p style="margin-left: auto;"><strong>Quality:</strong> <span id="qualityTV"> </span></p>
                    </div>
                    <div style="display: flex; margin-top: 0px;">
                        <p><strong>Price:</strong> <span id="priceTV"></span></p>
                        <p style="margin-left: auto;"><strong>Time:</strong> <span id="modalTime"></span></p>
                    </div>
                    
                    <div class="modal-actions">
                        <button style="margin-right: 8px;" id="modalCancelBtn">Cancel</button>
                        <button style="margin-left: 8px;" style="margin-right: 8px;" id="modalConfirmBtn">Confirm</button>
                    </div>
                </div>
            </div>

            <section id="booksDiv" class="active">
                <p id="titleTV" style="display: none;"> Books For </p>

                <div id="booksListDiv"></div>
            </section>
        </main>
    </body>
</html>
