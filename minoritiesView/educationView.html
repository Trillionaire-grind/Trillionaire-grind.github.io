<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>The Minorities</title>
        <style>
            :root {
                --bg: #f5f5f7;
                --surface: #ffffff;
                --text: #1c1b1f;
                --muted: #666;
                --primary: #af2d0b;
                --shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
                --radius: 16px;
            }

            body {
                margin: 0;
                font-family: Arial, sans-serif;
                background-color: var(--bg);
                color: var(--text);
            }

            .screen {
                min-height: 100dvh;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                box-sizing: border-box;
            }

            .class-card {
                width: min(520px, 100%);
                background: var(--surface);
                border-radius: var(--radius);
                box-shadow: var(--shadow);
                padding: 24px;
                text-align: center;
            }

            .eyebrow {
                color: var(--muted);
                margin: 0 0 8px;
                letter-spacing: 0.02em;
            }

            .headline {
                font-size: 32px;
                line-height: 1.2;
                margin: 0 0 24px;
            }

            .primary-btn {
                border: none;
                border-radius: 999px;
                padding: 12px 20px;
                font-size: 15px;
                font-weight: 700;
                color: #fff;
                background: var(--primary);
                cursor: pointer;
                min-height: 48px;
            }

            .primary-btn:hover {
                filter: brightness(0.95);
            }

            #currentClassDiv {
                display: none;
                height: 100dvh;
                width: 100vw;
            }
        </style>
    </head>
    <body>
        <div id="nextClassDiv" class="screen">
            <section class="class-card">
                <p class="eyebrow">Upcoming Live Session</p>
                <h1 class="headline">Tuesday at 4:00 PM EST</h1>
                <button id="showBtn" class="primary-btn" type="button" onclick="showClass()">Join Mock Class</button>
            </section>
        </div>

        <div id="currentClassDiv">
        </div>

    </body>



    <script>
        let nextClassDiv = document.getElementById("nextClassDiv")
        let currentClassDiv = document.getElementById("currentClassDiv")

        function showClass()
        {
            nextClassDiv.style.display = 'none'
            currentClassDiv.style.display = 'inline'
            createDiv()
        }

        function createDiv()
        {
            document.getElementById("currentClassDiv").innerHTML = `<iframe title="Live class stream" style="height: 100dvh; width: 100%; border: none;" src="https://us04web.zoom.us/j/79142289381?pwd=BkYjnBJfEcwjxA9lLjjf9kafc4Wmlv.1" allow="camera; microphone; display-capture"></iframe>       
`
        }
    </script>
    
</html>
