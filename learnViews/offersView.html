<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offers</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red: #D31034;
      --blue: #0020A0;
      --green: #005315;
      --cta: #FF0C36;
      --gold: #DAA123;
      --bg: #F0F1F3;
      --surface: #ffffff;
      --text: #1a1a1a;
      --muted: #5c6370;
      --radius: 16px;
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
      --max: 1080px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 0 0 48px;
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .offers-page {
      width: min(var(--max), 92%);
      margin: 0 auto;
      padding: 20px 0 40px;
    }

    .offers-intro {
      margin: 0 0 28px;
      font-size: 15px;
      color: var(--muted);
      max-width: 42rem;
      line-height: 1.65;
    }

    .offers-lanes {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 28px;
    }

    .offers-lane-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 600;
      padding: 10px 16px;
      border-radius: 999px;
      background: var(--surface);
      border: 1px solid rgba(0, 0, 0, 0.06);
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    }

    .offers-lane-pill:hover {
      border-color: rgba(0, 0, 0, 0.12);
    }

    .offers-lane-pill.is-active {
      box-shadow: var(--shadow);
    }

    .offers-lane-pill--all.is-active {
      color: var(--text);
      border-color: rgba(0, 0, 0, 0.12);
      background: var(--surface);
    }

    .offers-lane-pill--earn.is-active {
      color: var(--green);
      border-color: rgba(0, 83, 21, 0.25);
      background: rgba(0, 83, 21, 0.08);
    }

    .offers-lane-pill--fun.is-active {
      color: var(--gold);
      border-color: rgba(218, 161, 35, 0.35);
      background: rgba(218, 161, 35, 0.1);
    }

    .offers-page[data-filter="earn"] .offers-section--fun,
    .offers-page[data-filter="fun"] .offers-section--earn {
      display: none;
    }

    .offers-lane-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .offers-lane-dot--earn { background: var(--green); }
    .offers-lane-dot--fun { background: var(--gold); }

    .offers-lane-pill--earn { color: var(--green); }
    .offers-lane-pill--fun { color: var(--gold); }
    .offers-lane-pill--all { color: var(--muted); }

    .offers-section {
      margin-bottom: 40px;
    }

    .offers-section-head {
      margin-bottom: 16px;
    }

    .offers-section-head h2 {
      font-size: 1.25rem;
      font-weight: 700;
      margin: 0 0 6px;
      letter-spacing: -0.01em;
    }

    .offers-section-head p {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      max-width: 36rem;
    }

    .offers-stack {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .offer-card {
      background: var(--surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      border: 1px solid rgba(0, 0, 0, 0.05);
      border-left: 4px solid var(--offer-accent, var(--gold));
      overflow: hidden;
    }

    .offer-card--earn { --offer-accent: var(--green); }
    .offer-card--fun { --offer-accent: var(--gold); }

    .offer-hero {
      display: flex;
      align-items: stretch;
      gap: 32px;
      padding: 28px;
    }

    .offer-copy {
      flex: 1;
      min-width: 0;
    }

    .offer-type {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--offer-accent);
      margin: 0 0 10px;
    }

    .offer-copy h3 {
      font-size: clamp(1.25rem, 3vw, 1.6rem);
      font-weight: 700;
      margin: 0 0 8px;
      letter-spacing: -0.02em;
      line-height: 1.25;
    }

    .offer-subtitle {
      margin: 0 0 16px;
      font-size: 14px;
      color: var(--muted);
    }

    .offer-lead {
      margin: 0 0 14px;
      font-size: 15px;
      line-height: 1.65;
    }

    .offer-split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin: 20px 0;
    }

    .offer-split-box {
      background: var(--bg);
      border-radius: 12px;
      padding: 16px;
      border: 1px solid rgba(0, 0, 0, 0.05);
    }

    .offer-split-box h4 {
      margin: 0 0 8px;
      font-size: 13px;
      font-weight: 600;
      color: var(--offer-accent);
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .offer-split-box p {
      margin: 0;
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
    }

    .offer-list {
      margin: 0 0 20px;
      padding-left: 1.15em;
      font-size: 14px;
    }

    .offer-list li {
      margin-bottom: 8px;
    }

    .offer-list li::marker {
      color: var(--offer-accent);
    }

    .offer-actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 12px 16px;
    }

    .btn-primary-offer {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 14px 22px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      background: var(--cta);
      box-shadow: 0 4px 16px rgba(255, 12, 54, 0.28);
      border: none;
      cursor: pointer;
      font-family: inherit;
      transition: background 0.15s, transform 0.15s;
    }

    .btn-primary-offer:hover {
      background: #000;
      transform: translateY(-1px);
    }

    .btn-secondary-offer {
      display: inline-flex;
      align-items: center;
      padding: 14px 18px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      color: var(--text);
      background: var(--surface);
      border: 1px solid rgba(0, 0, 0, 0.1);
      transition: background 0.15s;
    }

    .btn-secondary-offer:hover {
      background: var(--bg);
    }

    .offer-note {
      font-size: 12px;
      color: var(--muted);
      width: 100%;
    }

    .offer-visual {
      width: min(220px, 32%);
      flex-shrink: 0;
      align-self: stretch;
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }

    .offer-visual--cover {
      background: #e8eaed;
      min-height: 200px;
    }

    .offer-visual--cover img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
    }

    .offer-visual--photo img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 35%;
    }

    .offer-visual--icon {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: linear-gradient(160deg, rgba(0, 32, 160, 0.06), rgba(211, 16, 52, 0.06));
      border: 1px solid rgba(0, 0, 0, 0.06);
      min-height: 160px;
    }

    .offer-visual--icon img {
      width: auto;
      max-width: 100%;
      max-height: 120px;
      object-fit: contain;
    }

    .offer-visual--funnel {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 24px 16px;
      background: linear-gradient(160deg, rgba(0, 83, 21, 0.08), rgba(0, 32, 160, 0.08));
      border: 1px solid rgba(0, 83, 21, 0.12);
    }

    .offer-visual--funnel img {
      width: 48px;
      height: auto;
    }

    .offer-visual--funnel span {
      font-size: 12px;
      font-weight: 600;
      text-align: center;
      color: var(--green);
      line-height: 1.4;
    }

    .offers-links {
      display: flex;
      flex-wrap: wrap;
      gap: 16px 24px;
      margin-top: 8px;
      padding-top: 24px;
      border-top: 1px solid rgba(0, 0, 0, 0.06);
    }

    .offers-links a {
      font-size: 14px;
      font-weight: 500;
      color: var(--blue);
      text-decoration: none;
    }

    .offers-links a:hover {
      text-decoration: underline;
      text-underline-offset: 3px;
    }

    @media (max-width: 768px) {
      .offer-hero {
        flex-direction: column;
        padding: 20px;
      }

      .offer-split {
        grid-template-columns: 1fr;
      }

      .offer-visual {
        order: -1;
        width: min(200px, 72%);
        margin: 0 auto;
        min-height: 160px;
        align-self: auto;
      }

      .offer-visual--cover {
        aspect-ratio: 2 / 3;
      }

      .offer-visual--cover img,
      .offer-visual--photo img {
        position: relative;
        inset: auto;
        height: 100%;
      }

      .offer-visual--photo {
        aspect-ratio: 16 / 9;
        max-height: 200px;
      }
    }
  </style>
</head>
<body>
  <div id="offersRoot" class="offers-page" data-filter="all"></div>

  <script type="module">
    import { initLearnNav, goToPage } from "./scripts/learnNav.js";
    import { renderOffersPage, wireOffersPage } from "./scripts/offersPage.js";

    initLearnNav("offers");

    const root = document.getElementById("offersRoot");
    renderOffersPage(root);
    wireOffersPage(root, { goToPage });
  </script>
</body>
</html>
