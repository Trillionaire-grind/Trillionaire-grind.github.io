

<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="shortcut icon" type="image/x-icon" href="../generalAssets/favicon.ico" />

        <title>Siguineau, Képler</title>
        <!-- Optional: set window.LEARN_GA_MEASUREMENT_ID = 'G-XXXXXXXX' for analytics -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="assets/learnNav.css">
        <style>
            html, body {
                margin: 0;
                padding: 0;
                font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                background-color: #F0F1F3;
                height: 100%;
                overflow: hidden; /* prevent scrolling */
            }

            .view-container {
                position: absolute;
                top: var(--learn-nav-height);
                left: 0;
                right: 0;
                bottom: 0;
                width: 100%;
            }

            .view-frame {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                border: none;
                display: none;
            }

            .view-frame.active {
                display: block;
                z-index: 1;
            }
        </style>
    </head>
    <body>
        <nav id="learnAppNav" class="learn-app-nav" aria-label="Main">
            <div class="learn-app-nav__inner">
                <a href="#home" class="learn-app-nav__brand" data-page="home">
                    <img class="learn-app-nav__logo" src="../generalAssets/logo_ks.png" alt="" width="32" height="32" />
                    <span class="learn-app-nav__brand-text">Siguineau, Képler</span>
                </a>
                <button type="button" class="learn-app-nav__toggle" id="learnNavToggle" aria-expanded="false" aria-controls="learnAppNavMenu" aria-label="Open menu">
                    <span class="learn-app-nav__toggle-bars" aria-hidden="true"></span>
                </button>
                <div id="learnAppNavMenu" class="learn-app-nav__links">
                    <a href="#home" data-page="home">Home</a>
                    <a href="#notes" data-page="notes">Notes</a>
                    <a href="#speak" data-page="speak">Talk to me</a>
                    <a href="#offers" data-page="offers">Offers</a>
                    <a href="/strangestSecret.html" target="_blank" rel="noopener noreferrer">Strangest Secret</a>
                    <a href="#kotfe" data-page="kotfe">Mangé Lakay</a>
                </div>
            </div>
            <div class="learn-app-nav__backdrop" id="learnNavBackdrop" hidden></div>
        </nav>

        <div class="view-container">
            <iframe data-src="testHome.html" id="homeView" class="view-frame" title="Home"></iframe>
            <iframe data-src="notesView.html" id="notesView" class="view-frame" title="Notes"></iframe>
            <iframe data-src="speakView.html" id="speakView" class="view-frame" title="Talk to me"></iframe>
            <iframe data-src="offersView.html" id="offersView" class="view-frame" title="Offers"></iframe>
            <iframe data-src="mangeKotfeView.html" id="kotfeView" class="view-frame" title="Mangé Lakay"></iframe>
        </div>
        <script>
            (function () {
                const VIEW_IDS = {
                    home: "homeView",
                    notes: "notesView",
                    speak: "speakView",
                    offers: "offersView",
                    kotfe: "kotfeView",
                };
                const hash = (location.hash || "#home").slice(1);
                const page = Object.prototype.hasOwnProperty.call(VIEW_IDS, hash) ? hash : "home";
                const view = document.getElementById(VIEW_IDS[page]);
                if (view) {
                    if (view.dataset.src) view.src = view.dataset.src;
                    view.classList.add("active");
                }
                document.querySelectorAll("#learnAppNav .learn-app-nav__links a").forEach((link) => {
                    link.classList.toggle("is-active", link.dataset.page === page);
                });
                window.__learnInitialPage = page;
            })();
        </script>

        <script type="module">
            import { initLearnAnalytics, trackLearnPageView } from "./scripts/learnAnalytics.js";
            import { wireLearnAppNav } from "./scripts/learnNav.js";
            initLearnAnalytics();
            trackLearnPageView("/learn", "Siguineau, Képler");
            wireLearnAppNav(document.getElementById("learnAppNav"));
        </script>
        <script>
            const views = {
                home: document.getElementById('homeView'),
                notes: document.getElementById('notesView'),
                speak: document.getElementById('speakView'),
                offers: document.getElementById('offersView'),
                kotfe: document.getElementById('kotfeView'),
            };

            const navLinks = document.querySelectorAll('#learnAppNav .learn-app-nav__links a');
            const brandLink = document.querySelector('#learnAppNav .learn-app-nav__brand');
            const PAGE_IDS = Object.keys(views);

            function loadView(view) {
                if (!view || view.src || !view.dataset.src) return;
                view.src = view.dataset.src;
            }

            function changeTo(pageId) {
                if (!views[pageId]) return;

                loadView(views[pageId]);

                Object.entries(views).forEach(([id, view]) => {
                    view.classList.toggle('active', id === pageId);
                });

                updateNav(pageId);
                document.getElementById('learnAppNav')?.classList.remove('learn-app-nav--open');
                document.getElementById('learnNavToggle')?.setAttribute('aria-expanded', 'false');
                document.getElementById('learnNavToggle')?.setAttribute('aria-label', 'Open menu');
                document.getElementById('learnNavBackdrop')?.setAttribute('hidden', '');

                const hash = '#' + pageId;
                if (location.hash !== hash) {
                    history.replaceState(null, '', hash);
                }

                if (pageId === 'notes') {
                    applyPendingNotesGenre();
                }
            }

            function applyPendingNotesGenre() {
                let genre;
                try {
                    genre = sessionStorage.getItem('learnNotesGenre');
                } catch (_) {
                    return;
                }
                if (!genre) return;

                const frame = views.notes;
                const send = () => {
                    frame.contentWindow?.postMessage({ type: 'learn-notes-genre', genre }, '*');
                    try {
                        sessionStorage.removeItem('learnNotesGenre');
                    } catch (_) {}
                };

                if (frame.contentDocument?.readyState === 'complete' && frame.src) {
                    send();
                } else {
                    frame.addEventListener('load', send, { once: true });
                }
            }

            window.changeTo = changeTo;

            function updateNav(pageId) {
                navLinks.forEach((link) => {
                    link.classList.toggle('is-active', link.dataset.page === pageId);
                });
            }

            navLinks.forEach((link) => {
                link.addEventListener('click', (event) => {
                    if (!link.dataset.page) return;
                    event.preventDefault();
                    changeTo(link.dataset.page);
                });
            });

            brandLink.addEventListener('click', (event) => {
                event.preventDefault();
                changeTo('home');
            });

            function hashToPage() {
                const key = (location.hash || '#home').slice(1);
                return PAGE_IDS.includes(key) ? key : 'home';
            }

            function setFullHeight() {
                const navHeight = document.getElementById('learnAppNav')?.offsetHeight || 56;
                const vh = window.innerHeight - navHeight;
                Object.values(views).forEach(view => {
                    view.style.height = `${vh}px`;
                });
            }

            window.addEventListener('resize', setFullHeight);
            window.addEventListener('hashchange', () => changeTo(hashToPage()));
            window.addEventListener('load', () => {
                setFullHeight();
                changeTo(window.__learnInitialPage || hashToPage());
            });
        </script>
    </body>
</html>
