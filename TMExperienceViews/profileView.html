<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile — TM Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/tmTheme.css?v=6">
</head>
<body class="tm-body">
    <div class="tm-page">
        <p class="tm-profile-greeting">Hello<br><span id="nameTV">Member</span></p>

        <div class="tm-profile-bio-header">
            <p class="tm-section-title">Your bio</p>
            <button type="button" id="signOutBtn" class="tm-btn tm-btn--secondary tm-profile-sign-out" disabled>Sign out</button>
        </div>
        <div class="tm-card tm-bio-card">
            <img src="assets/alex.jpeg" id="profileImage" alt="Profile photo">
            <div class="tm-bio-card__text">
                <p class="tm-bio-card__label">About you</p>
                <p class="tm-bio-card__bio" id="bioTV"></p>
            </div>
        </div>

        <p class="tm-section-title">Your speeches</p>
        <div id="speechesDiv" class="tm-speech-grid"></div>
    </div>

    <script type="module">
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { collection, doc, getDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getTmAuth, getTmDb } from "./scripts/tmFirebase.js";

        const auth = await getTmAuth();
        const db = getTmDb();
        const signOutBtn = document.getElementById("signOutBtn");

        function getUser() {
            onAuthStateChanged(auth, (user) => {
                if (user) {
                    fetchUserInfo(user.uid);
                    fetchSpeeches(user.uid);
                    signOutBtn.disabled = false;
                } else {
                    document.getElementById("nameTV").innerText = "Member";
                    document.getElementById("bioTV").innerText = "Sign in to view your profile.";
                    document.getElementById("profileImage").src = "assets/alex.jpeg";
                    document.getElementById("speechesDiv").innerHTML = "";
                    signOutBtn.disabled = true;
                }
            });
        }

        function openIndividualSpeech(speechId, uid) {
            const url = `./individualSpeech.html?v=7&speech=${encodeURIComponent(speechId)}&user=${encodeURIComponent(uid)}`;
            window.open(url, "_blank")?.focus();
        }

        async function fetchUserInfo(userId) {
            const docSnap = await getDoc(doc(db, "users", userId));
            if (docSnap.exists()) {
                setData(docSnap.data());
            }
        }

        function setData(data) {
            document.getElementById("nameTV").innerText = data.name;
            document.getElementById("bioTV").innerText = data.bio;
            document.getElementById("profileImage").src = data.imageUrl;
        }

        async function fetchSpeeches(userId) {
            const speechesDiv = document.getElementById("speechesDiv");
            speechesDiv.innerHTML = "";
            try {
                const querySnapshot = await getDocs(collection(db, `users/${userId}/speeches`));
                querySnapshot.forEach((speechDoc) => {
                    speechesDiv.appendChild(createSpeechDiv(speechDoc.id, speechDoc.data(), userId));
                });
            } catch (error) {
                speechesDiv.innerHTML = '<p class="tm-bio-card__bio">Failed to fetch speeches. Please try again later.</p>';
            }
        }

        function formatSpeechCardDate(dateValue) {
            const raw = String(dateValue || "").trim();
            if (!raw) return "Date TBD";

            const parsed = new Date(`${raw}T12:00:00`);
            if (Number.isNaN(parsed.getTime())) return raw;

            return parsed.toLocaleDateString(undefined, {
                month: "short",
                day: "numeric",
                year: "numeric",
            });
        }

        function createSpeechDiv(id, data, userId) {
            const card = document.createElement("button");
            card.type = "button";
            card.className = "tm-card tm-speech-card";
            const safeTitle = String(data?.title || data?.speechTitle || "Untitled speech").trim() || "Untitled speech";
            card.innerHTML = `<p class="tm-speech-card__date">${formatSpeechCardDate(id)}</p><p class="tm-speech-card__title">${safeTitle}</p>`;
            card.addEventListener("click", () => openIndividualSpeech(id, userId));
            return card;
        }

        signOutBtn.addEventListener("click", () => {
            signOutBtn.disabled = true;
            window.parent.postMessage({ type: "tm-sign-out" }, "*");
        });

        getUser();
    </script>
</body>
</html>
