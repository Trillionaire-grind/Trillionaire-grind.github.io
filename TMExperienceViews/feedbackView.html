<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Speeches — TM Experience</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        <link rel="stylesheet" href="assets/tmTheme.css?v=10">

        <script>
            function closeVoteModal() {
                document.getElementById("voteModal").classList.remove("is-open");
            }

            function closeFeebackDialog() {
                document.getElementById("feedbackDialog").classList.remove("is-open");
            }
        </script>
    </head>
    <body class="tm-body tm-speeches-body">
        <header class="tm-speeches-hero">
            <div class="tm-speeches-hero__inner">
                <div class="tm-speeches-hero__top">
                    <div>
                        <p class="tm-speeches-hero__eyebrow">Speeches</p>
                        <p id="speechesHeroMeta" class="tm-speeches-hero__meta">Tonight's speakers</p>
                    </div>
                    <span id="meetingLivePill" class="tm-live-pill is-not-live">
                        <span class="tm-live-pill__dot" aria-hidden="true"></span>
                        <span id="meetingLivePillText" class="tm-live-pill__text">Not live</span>
                    </span>
                </div>
            </div>
        </header>

        <div class="tm-page tm-speeches-page">
            <div id="speechesLoading" class="tm-speeches-loading" hidden>
                <div class="tm-speeches-skeleton tm-speeches-skeleton--photo"></div>
                <div class="tm-speeches-skeleton tm-speeches-skeleton--line"></div>
                <div class="tm-speeches-skeleton tm-speeches-skeleton--line short"></div>
            </div>

            <div id="speechesEmpty" class="tm-speeches-empty" hidden>
                <p id="speechesEmptyTitle" class="tm-speeches-empty__title">No speakers assigned</p>
                <p id="speechesEmptyCopy" class="tm-speeches-empty__copy">Publish an agenda with speakers in Admin.</p>
            </div>

            <article id="speechesContent" class="tm-speeches-card" hidden>
                <div class="tm-speeches-card__toolbar">
                    <button type="button" id="openFeedbackBtn" class="tm-btn tm-btn--secondary tm-speeches-feedback-btn" disabled>Give feedback</button>
                </div>

                <div class="tm-speaker-carousel">
                    <button type="button" class="tm-carousel-btn" id="leftBtn" aria-label="Previous speaker">&#8249;</button>
                    <div class="tm-speaker-photo" id="speakerPhotoWrap">
                        <img id="currentSpeakerImg" src="assets/person_b.svg" alt="Current speaker">
                    </div>
                    <button type="button" class="tm-carousel-btn" id="rightBtn" aria-label="Next speaker">&#8250;</button>
                </div>

                <p id="speakerCounter" class="tm-speaker-counter">Speaker 1 of 4</p>

                <div class="tm-dot-row">
                    <button type="button" id="firstSpeakerSelector" aria-label="Speaker 1"></button>
                    <button type="button" id="secondSpeakerSelector" aria-label="Speaker 2"></button>
                    <button type="button" id="thirdSpeakerSelector" aria-label="Speaker 3"></button>
                    <button type="button" id="fourthSpeakerSelector" aria-label="Speaker 4"></button>
                </div>

                <div class="tm-speeches-card__body">
                    <h2 id="currentSpeakerName" class="tm-speaker-name">Speaker</h2>
                    <p id="currentSpeakerTitle" class="tm-speaker-speech-title"></p>
                    <p id="currentSpeakerPath" class="tm-speaker-speech-path"></p>
                    <div id="currentSpeakerAboutWrap" class="tm-speaker-about">
                        <p class="tm-speaker-about__label">About</p>
                        <div class="tm-speaker-about__scroll">
                            <p id="currentSpeakerBio" class="tm-speaker-bio"></p>
                        </div>
                    </div>
                </div>
            </article>

            <button id="voteBtn" type="button" class="tm-btn tm-btn--primary tm-speeches-vote-btn" hidden disabled>Vote</button>
        </div>

        <div id="voteModal" class="tm-modal" role="dialog" aria-modal="true" aria-labelledby="voteModalTitle">
            <div class="tm-modal__panel tm-vote-modal">
                <div class="tm-vote-modal__header">
                    <div>
                        <h2 id="voteModalTitle" class="tm-vote-modal__title">Cast your vote</h2>
                        <p class="tm-vote-modal__copy">Pick tonight's best speaker, evaluator, and table topics participant.</p>
                    </div>
                    <button type="button" class="tm-vote-modal__close" onclick="closeVoteModal()" aria-label="Close">&times;</button>
                </div>

                <div class="tm-vote-modal__field">
                    <label for="bestSpeaker">Best speaker</label>
                    <select id="bestSpeaker">
                        <option value="" disabled selected>Select a speaker</option>
                        <option id="firstSpeakerOption"></option>
                        <option id="secondSpeakerOption"></option>
                        <option id="thirdSpeakerOption"></option>
                        <option id="fourthSpeakerOption"></option>
                    </select>
                </div>

                <div class="tm-vote-modal__field">
                    <label for="bestEvaluator">Best evaluator</label>
                    <select id="bestEvaluator">
                        <option value="" disabled selected>Select an evaluator</option>
                        <option id="firstEval"></option>
                        <option id="secondEval"></option>
                        <option id="thirdEval"></option>
                        <option id="fourthEval"></option>
                    </select>
                </div>

                <div class="tm-vote-modal__field">
                    <label for="bestTable">Best table topics speaker</label>
                    <input type="text" id="bestTable" name="bestTable" placeholder="Enter name">
                </div>

                <div class="tm-vote-modal__actions">
                    <button type="button" class="tm-btn tm-btn--secondary" onclick="closeVoteModal()">Cancel</button>
                    <button type="button" id="castVoteBtn" class="tm-btn tm-btn--primary">Submit vote</button>
                </div>
            </div>
        </div>

        <div id="feedbackDialog" class="tm-modal" role="dialog" aria-modal="true" aria-labelledby="feedbackTitle">
            <div class="tm-modal__panel tm-vote-modal">
                <div class="tm-vote-modal__header">
                    <div>
                        <h2 id="feedbackTitle" class="tm-vote-modal__title">Give feedback</h2>
                        <p id="feedbackModalCopy" class="tm-vote-modal__copy">Share constructive feedback for tonight's speaker.</p>
                    </div>
                    <button type="button" class="tm-vote-modal__close" onclick="closeFeebackDialog()" aria-label="Close">&times;</button>
                </div>

                <p id="feedbackId" hidden></p>

                <div class="tm-vote-modal__field">
                    <label for="feedbackTV">Your feedback</label>
                    <textarea id="feedbackTV" name="feedback" rows="5" placeholder="What went well? What could improve?"></textarea>
                </div>

                <div class="tm-vote-modal__actions">
                    <button type="button" class="tm-btn tm-btn--secondary" onclick="closeFeebackDialog()">Cancel</button>
                    <button type="button" id="leaveFeedbackBtn" class="tm-btn tm-btn--primary">Submit feedback</button>
                </div>
            </div>
        </div>

        <script type="module">
            import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
            import { collection, doc, addDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
            import { getTmAuth, getTmDb } from "./scripts/tmFirebase.js";
            import {
                findRoleAssignment,
                formatMeetingDate,
                getAgendaMeta,
                getSpeakerAssignments,
                normalizeAgendaDoc,
                EVALUATOR_ROLE_IDS,
            } from "./scripts/tmAgendaData.js?v=3";
            import { buildSpeechDocPayload } from "./scripts/tmSpeechRecords.js";
            import { subscribeAgendaDoc, isMeetingLive as readMeetingLiveFromDoc } from "./scripts/tmAgendaFirestore.js?v=5";

            const auth = await getTmAuth();
            const db = getTmDb();

            const voteBtn = document.getElementById("voteBtn");
            const castVoteBtn = document.getElementById("castVoteBtn");
            const bestSpeaker = document.getElementById("bestSpeaker");
            const bestEvaluator = document.getElementById("bestEvaluator");
            const bestTable = document.getElementById("bestTable");
            const openFeedbackBtn = document.getElementById("openFeedbackBtn");
            const leaveFeedbackBtn = document.getElementById("leaveFeedbackBtn");
            const feedbackTV = document.getElementById("feedbackTV");
            const feedbackDialog = document.getElementById("feedbackDialog");
            const rightBtn = document.getElementById("rightBtn");
            const leftBtn = document.getElementById("leftBtn");
            const speakerPhotoWrap = document.getElementById("speakerPhotoWrap");
            const speechesLoading = document.getElementById("speechesLoading");
            const speechesEmpty = document.getElementById("speechesEmpty");
            const speechesContent = document.getElementById("speechesContent");
            const meetingLivePill = document.getElementById("meetingLivePill");
            const meetingLivePillText = document.getElementById("meetingLivePillText");
            const speechesHeroMeta = document.getElementById("speechesHeroMeta");

            const dotButtons = [
                document.getElementById("firstSpeakerSelector"),
                document.getElementById("secondSpeakerSelector"),
                document.getElementById("thirdSpeakerSelector"),
                document.getElementById("fourthSpeakerSelector"),
            ];

            let meetingIsLive = false;
            let currentMeetingDate = "";
            const BYPASS_LIVE_CHECK_FOR_UI_TEST = false;

            let index = 0;
            let speakers = [];
            let unsubAgenda = null;

            const voteRef = collection(db, "votes");
            const DEFAULT_SPEAKER_IMAGE = "assets/person_b.svg";

            function resolveSpeakerImage(url) {
                const raw = String(url || "").trim();
                return raw || DEFAULT_SPEAKER_IMAGE;
            }

            function isPlaceholderSpeakerImage(url) {
                const resolved = resolveSpeakerImage(url);
                return resolved === DEFAULT_SPEAKER_IMAGE || resolved.endsWith("/person_b.svg");
            }

            function setViewState(state) {
                speechesLoading.hidden = state !== "loading";
                speechesEmpty.hidden = state !== "empty";
                speechesContent.hidden = state !== "content";
                voteBtn.hidden = state !== "content";
            }

            function showEmptyState(title, copy) {
                document.getElementById("speechesEmptyTitle").textContent = title;
                document.getElementById("speechesEmptyCopy").textContent = copy;
                setViewState("empty");
                updateLivePill(false);
                voteBtn.disabled = true;
                openFeedbackBtn.disabled = true;
            }

            function updateMeetingMeta(dateValue) {
                const formatted = formatMeetingDate(dateValue);
                speechesHeroMeta.textContent = formatted === "Date TBD"
                    ? "Tonight's speakers"
                    : formatted;
            }

            function updateLivePill(isLive) {
                meetingLivePillText.textContent = isLive ? "Live" : "Not live";
                meetingLivePill.classList.toggle("is-live", isLive);
                meetingLivePill.classList.toggle("is-not-live", !isLive);
            }

            function applyMeetingLiveState(loaded) {
                meetingIsLive = loaded?.isLive ?? readMeetingLiveFromDoc(loaded?.data);
                updateActionButtons();
            }

            function isMeetingLiveForActions() {
                return meetingIsLive || BYPASS_LIVE_CHECK_FOR_UI_TEST;
            }

            function updateActionButtons() {
                const live = isMeetingLiveForActions();
                const canInteract = live && speakers.length > 0;
                voteBtn.disabled = !canInteract;
                openFeedbackBtn.disabled = !canInteract;
                updateLivePill(live);
            }

            function updateCarouselButtons() {
                const disabled = speakers.length <= 1;
                leftBtn.disabled = disabled;
                rightBtn.disabled = disabled;
            }

            function updateSpeakerCounter() {
                const counter = document.getElementById("speakerCounter");
                if (!counter) return;
                counter.textContent = speakers.length
                    ? `Speaker ${index + 1} of ${speakers.length}`
                    : "";
            }

            function openPopup() {
                document.getElementById("voteModal").classList.add("is-open");
            }

            function openFeedbackDialog() {
                const copyEl = document.getElementById("feedbackModalCopy");
                if (copyEl && speakers[index]) {
                    copyEl.textContent = `Share constructive feedback for ${speakers[index].name}.`;
                }
                document.getElementById("feedbackDialog").classList.add("is-open");
            }

            async function addFeedback() {
                const feedbackValue = feedbackTV.value.trim();
                const speaker = speakers[index];
                const id = speaker?.id;
                if (!feedbackValue) {
                    alert("Enter feedback before submitting.");
                    return;
                }
                if (!id) {
                    alert("Speaker profile is missing. Republish the agenda from Admin.");
                    return;
                }
                if (!currentMeetingDate) {
                    alert("Meeting date is missing. Republish the agenda from Admin.");
                    return;
                }

                try {
                    await setDoc(
                        doc(db, "users", id, "speeches", currentMeetingDate),
                        buildSpeechDocPayload({
                            path: speaker.path,
                            title: speaker.title,
                        }),
                        { merge: true }
                    );

                    await addDoc(collection(db, "users", id, "speeches", currentMeetingDate, "feedback"), {
                        feedback: feedbackValue,
                    });

                    alert("Feedback given successfully");
                    feedbackTV.value = "";
                    closeFeebackDialog();
                } catch (error) {
                    console.error("Failed to save feedback:", error);
                    alert("Could not save feedback. Try again.");
                }
            }

            async function loadSpeakerProfile(assignment) {
                const speaker = {
                    id: assignment.userId || "",
                    name: String(assignment.member || "").trim() || "Speaker",
                    bio: "",
                    imageUrl: resolveSpeakerImage(assignment.imageUrl),
                    path: assignment.path || "",
                    title: assignment.title || "",
                };

                if (!assignment.userId) return speaker;

                try {
                    const docSnap = await getDoc(doc(db, "users", assignment.userId));
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        speaker.name = data.name || speaker.name;
                        speaker.bio = data.bio || speaker.bio;
                        speaker.imageUrl = resolveSpeakerImage(data.imageUrl || assignment.imageUrl);
                        speaker.id = assignment.userId;
                    }
                } catch (error) {
                    console.warn("Could not load speaker profile:", assignment.userId, error);
                }

                return speaker;
            }

            function setSpeakerOption(option, speaker) {
                if (!option || !speaker?.name) return;
                option.value = speaker.name;
                option.textContent = speaker.name;
            }

            function updateSpeakerDots() {
                dotButtons.forEach((dot, dotIndex) => {
                    if (!dot) return;
                    dot.hidden = dotIndex >= speakers.length;
                });
            }

            async function renderSpeakersFromAgenda(loaded) {
                const firstEval = document.getElementById("firstEval");
                const secondEval = document.getElementById("secondEval");
                const thirdEval = document.getElementById("thirdEval");
                const fourthEval = document.getElementById("fourthEval");

                const speakerOptions = [
                    document.getElementById("firstSpeakerOption"),
                    document.getElementById("secondSpeakerOption"),
                    document.getElementById("thirdSpeakerOption"),
                    document.getElementById("fourthSpeakerOption"),
                ];
                const evaluatorOptions = [firstEval, secondEval, thirdEval, fourthEval];

                speakerOptions.forEach((option) => {
                    if (!option) return;
                    option.value = "";
                    option.textContent = "";
                });

                if (!loaded?.data) {
                    speakers = [];
                    meetingIsLive = false;
                    showEmptyState("No speakers assigned", "Publish an agenda with speakers in Admin.");
                    return;
                }

                meetingIsLive = loaded.isLive ?? readMeetingLiveFromDoc(loaded.data);

                const normalized = normalizeAgendaDoc(loaded.data);
                const data = normalized.data;
                const meta = getAgendaMeta(data);
                currentMeetingDate = String(loaded.data.meetingDate || meta.date || "").trim();
                updateMeetingMeta(currentMeetingDate);

                const assignments = getSpeakerAssignments(data);
                speakers = await Promise.all(assignments.map((assignment) => loadSpeakerProfile(assignment)));

                speakers.forEach((speaker, speakerIndex) => {
                    setSpeakerOption(speakerOptions[speakerIndex], speaker);
                });

                EVALUATOR_ROLE_IDS.forEach((roleId, evaluatorIndex) => {
                    const assignment = findRoleAssignment(data, roleId);
                    const option = evaluatorOptions[evaluatorIndex];
                    if (!assignment?.member || !option) return;
                    option.value = assignment.member;
                    option.textContent = assignment.member;
                });

                updateSpeakerDots();
                updateCarouselButtons();

                if (speakers.length > 0) {
                    index = Math.min(index, speakers.length - 1);
                    setViewState("content");
                    showSelectedSpeaker(index);
                } else {
                    showEmptyState("No speakers assigned", "Publish an agenda with speakers in Admin.");
                }

                updateActionButtons();
            }

            function onAgendaSnapshot(loaded) {
                if (!loaded?.data) {
                    if (speakers.length === 0) {
                        renderSpeakersFromAgenda(loaded).catch(handleAgendaRenderError);
                    } else {
                        applyMeetingLiveState(loaded);
                    }
                    return;
                }

                renderSpeakersFromAgenda(loaded).catch(handleAgendaRenderError);
            }

            function handleAgendaRenderError(error) {
                console.error("Failed to render speakers:", error);
                showEmptyState("Could not load speakers", "Check your connection and try again.");
            }

            function setSpeaker(speakerIndex) {
                const speaker = speakers[speakerIndex];
                if (!speaker) return;

                document.getElementById("currentSpeakerName").textContent = speaker.name;
                document.getElementById("currentSpeakerTitle").textContent = speaker.title || "";
                document.getElementById("currentSpeakerPath").textContent = speaker.path || "";
                document.getElementById("currentSpeakerBio").textContent = speaker.bio || "";

                const imgEl = document.getElementById("currentSpeakerImg");
                const photoWrap = document.getElementById("speakerPhotoWrap");
                const imageUrl = resolveSpeakerImage(speaker.imageUrl);

                imgEl.onerror = () => {
                    imgEl.onerror = null;
                    imgEl.src = DEFAULT_SPEAKER_IMAGE;
                    photoWrap.classList.add("is-placeholder");
                };
                imgEl.src = imageUrl;
                imgEl.alt = speaker.name;
                photoWrap.classList.toggle("is-placeholder", isPlaceholderSpeakerImage(imageUrl));
            }

            function stopAgendaListener() {
                if (unsubAgenda) {
                    unsubAgenda();
                    unsubAgenda = null;
                }
            }

            function startAgendaListener() {
                stopAgendaListener();
                setViewState("loading");

                unsubAgenda = subscribeAgendaDoc(db, {
                    onData: onAgendaSnapshot,
                    onError: (error) => {
                        console.error("Speeches agenda listener failed:", error);
                        showEmptyState("Could not load speakers", "Check your connection and try again.");
                    },
                });
            }

            async function refreshSpeakers() {
                await auth.authStateReady();
                if (!auth.currentUser) {
                    stopAgendaListener();
                    speakers = [];
                    showEmptyState("Sign in to view speakers", "Sign in from the welcome screen to see tonight's speakers.");
                    return;
                }
                startAgendaListener();
            }

            function castVote() {
                const user = auth.currentUser;
                if (!user) {
                    alert("Sign in to cast a vote.");
                    return;
                }

                const bestSpeakerValue = bestSpeaker.options[bestSpeaker.selectedIndex].text;
                const bestEvaluatorValue = bestEvaluator.options[bestEvaluator.selectedIndex].text;
                const bestTableValue = bestTable.value.trim();

                if (!bestSpeakerValue || bestSpeakerValue === "Select a speaker") {
                    alert("Choose a best speaker.");
                    return;
                }
                if (!bestEvaluatorValue || bestEvaluatorValue === "Select an evaluator") {
                    alert("Choose a best evaluator.");
                    return;
                }
                if (!bestTableValue) {
                    alert("Enter a table topics speaker name.");
                    return;
                }

                setDoc(doc(voteRef, user.uid), {
                    bestSpeaker: `${bestSpeakerValue}`,
                    bestEvaluator: `${bestEvaluatorValue}`,
                    bestTable: `${bestTableValue}`,
                });
                alert("your vote has been casted");
                closeVoteModal();
            }

            castVoteBtn.onclick = () => {
                castVote();
            };

            rightBtn.onclick = () => {
                updateSpeaker(1);
            };

            leftBtn.onclick = () => {
                updateSpeaker(-1);
            };

            function updateSpeaker(positionChange) {
                const lastIndex = speakers.length - 1;
                if (lastIndex < 0) return;

                if (index === 0 && positionChange === -1) {
                    index = lastIndex;
                } else if (index === lastIndex && positionChange === 1) {
                    index = 0;
                } else {
                    index = index + positionChange;
                }

                showSelectedSpeaker(index);
            }

            function showSelectedSpeaker(selectedIndex) {
                dotButtons.forEach((dot, dotIndex) => {
                    if (!dot || dotIndex >= speakers.length) return;
                    dot.classList.toggle("is-active", dotIndex === selectedIndex);
                });
                setSpeaker(selectedIndex);
                updateSpeakerCounter();
            }

            onAuthStateChanged(auth, (user) => {
                if (!user) {
                    stopAgendaListener();
                    speakers = [];
                    showEmptyState("Sign in to view speakers", "Sign in from the welcome screen to see tonight's speakers.");
                    return;
                }

                refreshSpeakers().catch((error) => {
                    console.error("Failed to load speakers:", error);
                    showEmptyState("Could not load speakers", "Check your connection and try again.");
                });
            });

            async function handleParentAuthMessage(event) {
                if (event.data?.type === "tm-auth-state") {
                    if (!event.data.signedIn) {
                        stopAgendaListener();
                        speakers = [];
                        showEmptyState("Sign in to view speakers", "Sign in from the welcome screen to see tonight's speakers.");
                        return;
                    }

                    await auth.authStateReady();
                    if (!auth.currentUser) {
                        location.reload();
                        return;
                    }

                    refreshSpeakers().catch((error) => {
                        console.error("Failed to load speakers:", error);
                    });
                    return;
                }

                if (event.data?.type === "tm-reload-speakers") {
                    refreshSpeakers().catch((error) => {
                        console.error("Failed to reload speakers:", error);
                    });
                }
            }

            window.addEventListener("message", (event) => {
                handleParentAuthMessage(event);
            });

            dotButtons.forEach((dot, dotIndex) => {
                if (!dot) return;
                dot.addEventListener("click", () => {
                    if (dotIndex >= speakers.length) return;
                    index = dotIndex;
                    showSelectedSpeaker(index);
                });
            });

            leaveFeedbackBtn.onclick = () => {
                if (!feedbackTV.value.trim()) {
                    alert("Enter your feedback before submitting.");
                    return;
                }
                addFeedback();
            };

            openFeedbackBtn.onclick = () => {
                if (isMeetingLiveForActions()) {
                    openFeedbackDialog();
                } else {
                    alert("Meeting is not live");
                }
            };

            voteBtn.onclick = () => {
                if (isMeetingLiveForActions()) {
                    openPopup();
                } else {
                    alert("Meeting is not live");
                }
            };

            document.getElementById("voteModal").addEventListener("click", (event) => {
                if (event.target.id === "voteModal") closeVoteModal();
            });

            feedbackDialog.addEventListener("click", (event) => {
                if (event.target.id === "feedbackDialog") closeFeebackDialog();
            });

            let touchStartX = 0;
            speakerPhotoWrap.addEventListener("touchstart", (event) => {
                touchStartX = event.changedTouches[0].screenX;
            }, { passive: true });

            speakerPhotoWrap.addEventListener("touchend", (event) => {
                const delta = event.changedTouches[0].screenX - touchStartX;
                if (Math.abs(delta) < 40 || speakers.length <= 1) return;
                updateSpeaker(delta < 0 ? 1 : -1);
            }, { passive: true });
        </script>
    </body>
</html>
