<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your speech — TM Experience</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="assets/tmTheme.css?v=33">
</head>
<body class="tm-body tm-speech-detail-body">
    <div class="tm-page tm-speech-detail-page">
        <button type="button" id="backBtn" class="tm-speech-detail-back">← Back to profile</button>

        <div id="speechLoading" class="tm-speech-detail-loading">
            <div class="tm-speeches-skeleton tm-speeches-skeleton--line"></div>
            <div class="tm-speeches-skeleton tm-speeches-skeleton--line short"></div>
            <div class="tm-speech-detail-feedback-skeleton"></div>
            <div class="tm-speech-detail-feedback-skeleton"></div>
        </div>

        <div id="speechError" class="tm-speech-detail-empty" hidden>
            <p id="speechErrorTitle" class="tm-speech-detail-empty__title">Could not load speech</p>
            <p id="speechErrorCopy" class="tm-speech-detail-empty__copy">Check the link and try again.</p>
        </div>

        <section id="speechContent" hidden>
            <div class="tm-speech-detail-feedback-header">
                <h2 class="tm-section-title">Speech info</h2>
            </div>

            <article id="speechMetaCard" class="tm-card tm-speech-detail-meta">
                <p class="tm-speech-detail-meta__label">Date</p>
                <p id="speechDate" class="tm-speech-detail-meta__value"></p>
                <p class="tm-speech-detail-meta__label">Project title</p>
                <p id="speechProjectTitle" class="tm-speech-detail-meta__value"></p>
                <p class="tm-speech-detail-meta__label">Path</p>
                <p id="speechPath" class="tm-speech-detail-meta__value"></p>
            </article>

            <div class="tm-speech-detail-feedback-header">
                <h2 class="tm-section-title">Feedback</h2>
                <span id="feedbackCount" class="tm-speech-detail-feedback-count">0</span>
            </div>

            <div id="feedbackList" class="tm-speech-detail-feedback-list"></div>

            <div id="feedbackEmpty" class="tm-speech-detail-empty" hidden>
                <p class="tm-speech-detail-empty__title">No feedback yet</p>
                <p class="tm-speech-detail-empty__copy">Feedback from club members will appear here after your speech.</p>
            </div>
        </section>
    </div>

    <script type="module">
        import { collection, doc, getDoc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getTmAuth, getTmDb, ensureFirestoreAuth } from "./scripts/tmFirebase.js";
        import { formatMeetingDate, getAgendaMeta, loadAndMigrateAgendaDoc, normalizeAgendaDoc } from "./scripts/tmAgendaData.js?v=3";
        import { loadAgendaDoc } from "./scripts/tmAgendaFirestore.js?v=3";
        import {
            collectFeedbackEntries,
            getFeedbackSpeechIds,
            resolveSpeechDisplay,
        } from "./scripts/tmSpeechRecords.js?v=2";

        const auth = await getTmAuth();
        const db = getTmDb();

        const speechDate = document.getElementById("speechDate");
        const speechProjectTitle = document.getElementById("speechProjectTitle");
        const speechPath = document.getElementById("speechPath");
        const speechLoading = document.getElementById("speechLoading");
        const speechError = document.getElementById("speechError");
        const speechErrorTitle = document.getElementById("speechErrorTitle");
        const speechErrorCopy = document.getElementById("speechErrorCopy");
        const speechContent = document.getElementById("speechContent");
        const feedbackList = document.getElementById("feedbackList");
        const feedbackEmpty = document.getElementById("feedbackEmpty");
        const feedbackCount = document.getElementById("feedbackCount");
        const backBtn = document.getElementById("backBtn");

        let unsubFeedback = null;
        let activeSpeechId = "";
        let activeUserId = "";

        function getSpeechParams() {
            const params = new URLSearchParams(window.location.search);
            return {
                speechId: params.get("speech"),
                userId: params.get("user"),
            };
        }

        function setViewState(state) {
            speechLoading.hidden = state !== "loading";
            speechError.hidden = state !== "error";
            speechContent.hidden = state !== "content";
        }

        function showError(title, copy) {
            speechErrorTitle.textContent = title;
            speechErrorCopy.textContent = copy;
            updateDocumentTitle("Speech unavailable");
            setViewState("error");
        }

        function splitSentences(text) {
            const matches = text.match(/[^.!?]+[.!?]+(?:\s|$)|[^.!?]+$/g);
            if (!matches) return [text];
            return matches.map((part) => part.trim()).filter(Boolean);
        }

        function createFeedbackCard(text) {
            const card = document.createElement("article");
            card.className = "tm-card tm-speech-detail-feedback-card";

            const sentences = splitSentences(text);
            const needsTruncation = sentences.length > 2;
            const textEl = document.createElement("p");
            textEl.className = "tm-speech-detail-feedback-card__text";

            if (needsTruncation) {
                const preview = sentences.slice(0, 2).join(" ");
                textEl.textContent = preview;

                const readMoreBtn = document.createElement("button");
                readMoreBtn.type = "button";
                readMoreBtn.className = "tm-speech-detail-feedback-card__read-more";
                readMoreBtn.textContent = "Read more";
                readMoreBtn.setAttribute("aria-expanded", "false");

                readMoreBtn.addEventListener("click", () => {
                    const expanded = readMoreBtn.getAttribute("aria-expanded") === "true";
                    if (expanded) {
                        textEl.textContent = preview;
                        readMoreBtn.textContent = "Read more";
                        readMoreBtn.setAttribute("aria-expanded", "false");
                    } else {
                        textEl.textContent = text;
                        readMoreBtn.textContent = "Read less";
                        readMoreBtn.setAttribute("aria-expanded", "true");
                    }
                });

                card.appendChild(textEl);
                card.appendChild(readMoreBtn);
            } else {
                textEl.textContent = text;
                card.appendChild(textEl);
            }

            return card;
        }

        function renderFeedbackEntries(entries) {
            feedbackList.innerHTML = "";
            feedbackCount.textContent = String(entries.length);
            feedbackEmpty.hidden = entries.length > 0;

            entries.forEach(({ text }) => {
                feedbackList.appendChild(createFeedbackCard(text));
            });
        }

        function updateDocumentTitle(title) {
            const safeTitle = String(title || "Your speech").trim() || "Your speech";
            document.title = `${safeTitle} — TM Experience`;
        }

        function renderSpeechMeta({ title, path, date }) {
            updateDocumentTitle(title);
            speechDate.textContent = date || "Date TBD";
            speechProjectTitle.textContent = title;
            speechPath.textContent = path || "—";
        }

        function stopFeedbackListener() {
            if (unsubFeedback) {
                unsubFeedback();
                unsubFeedback = null;
            }
        }

        function startFeedbackListener(userId, speechId, agendaMeetingDate = "") {
            stopFeedbackListener();

            const speechIds = getFeedbackSpeechIds(speechId, agendaMeetingDate);
            const mergedEntries = new Map();

            function publishFeedback() {
                renderFeedbackEntries([...mergedEntries.values()]);
            }

            const unsubscribers = speechIds.map((id) =>
                onSnapshot(
                    collection(db, "users", userId, "speeches", id, "feedback"),
                    (snapshot) => {
                        [...mergedEntries.keys()]
                            .filter((key) => key.startsWith(`${id}:`))
                            .forEach((key) => mergedEntries.delete(key));

                        collectFeedbackEntries(snapshot).forEach((entry) => {
                            mergedEntries.set(`${id}:${entry.id}`, entry);
                        });

                        publishFeedback();
                    },
                    (error) => {
                        console.error("Feedback listener failed:", error);
                    }
                )
            );

            unsubFeedback = () => {
                unsubscribers.forEach((unsub) => unsub());
            };
        }

        async function loadSpeech(speechId, userId) {
            setViewState("loading");
            activeSpeechId = speechId;
            activeUserId = userId;
            stopFeedbackListener();

            try {
                const authedUser = await ensureFirestoreAuth(auth);
                if (!authedUser) {
                    showError(
                        "Sign in required",
                        "Open TM Experience, sign in to your club account, then open this speech again."
                    );
                    return;
                }

                const speechRef = doc(db, "users", userId, "speeches", speechId);
                const [speechSnapshot, agendaLoaded] = await Promise.all([
                    getDoc(speechRef),
                    loadAgendaDoc(db, {
                        getDocFn: getDoc,
                        setDocFn: setDoc,
                        loadAndMigrateAgendaDoc,
                    }).catch(() => null),
                ]);

                if (!speechSnapshot.exists()) {
                    showError("Speech not found", "This speech may have been removed or the link is incorrect.");
                    return;
                }

                const speechData = speechSnapshot.data();
                const agendaMeetingDate = String(
                    agendaLoaded?.data?.meetingDate
                    || getAgendaMeta(normalizeAgendaDoc(agendaLoaded?.data || {}).data).date
                    || ""
                ).trim();
                const display = resolveSpeechDisplay(
                    speechId,
                    userId,
                    speechData,
                    agendaLoaded?.data || null
                );
                const formattedDate = formatMeetingDate(speechId);
                renderSpeechMeta({ ...display, date: formattedDate });

                startFeedbackListener(userId, speechId, agendaMeetingDate);
                setViewState("content");
            } catch (error) {
                console.error("Failed to load speech:", error);
                const denied = error?.code === "permission-denied";
                showError(
                    denied ? "Could not access speech" : "Could not load speech",
                    denied
                        ? "Sign in with your club account and confirm your profile uses club naples-sunrise-bay."
                        : "Check your connection and try again."
                );
            }
        }

        backBtn.addEventListener("click", () => {
            if (window.opener && !window.opener.closed) {
                window.close();
                return;
            }
            window.location.href = "./profileView.html";
        });

        const { speechId, userId } = getSpeechParams();
        if (!speechId || !userId) {
            showError("Invalid link", "This speech link is missing the speech or user id.");
        } else {
            loadSpeech(speechId, userId);
        }
    </script>
</body>
</html>
