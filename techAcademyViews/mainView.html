<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tech Mastery For Seniors Academy</title>
        <link rel="icon" type="image/x-icon" href="assets/icon.ico">
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: Arial, sans-serif;
                background-color: #F0F1F3;
            }
            footer {
                position: fixed;
                bottom: 0;
                width: 100%;
                background-color: #f0f0f0;
                text-align: center;
                padding: 10px 0;
                box-sizing: border-box;
                margin: 0;
            }
            footer nav {
                display: none;
                justify-content: space-evenly;
            }
            footer nav a {
                text-decoration: none;
                color: #333;
            }
            footer nav a:hover {
                color: #007bff;
            }

            .card-container {
                display: flex;
                width: 90%;
                margin: 0 auto;
                flex-wrap: wrap;
            }
            .card {
                width: 45%;
                margin: 10px;
                background-color: white;
                border-radius: 6px;
                overflow: hidden;
                box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.1);
            }
            .card img {
                width: 100%;
                height: auto;
            }
            .card-content {
                padding: 10px;
            }

            @media (max-width: 768px) {
                .card {
                    width: 100%;
                }
            }
        </style>
        
    </head>
    <body>
        <div style="padding-bottom: 58px;" >
            <div style="display: inline;" id="homeView" style="height: 100vh; width: 100%; ">
                <iframe src="homeView.html" style="height: 100vh; width: 100%;"></iframe>
            </div>
            <div style="display: none;"  id="educationView"  style="height: 100vh;  width: 100%;">
                <iframe src="educationView.html" style="height: 100vh; width: 100%;"></iframe>
            </div>
            <div  style="display: none;"  id="chatView" style="height: 100vh;  width: 100%;">
                <iframe src="chatView.html" style="height: 100vh; width: 100%;"></iframe>
            </div>
        </div>
        <footer >
            <nav id="firstNav" >
                <a href="#"><img id="homeBtn" src="assets/house.svg" height="24px" width="24px" onclick="changeTo(0)"></a>            
                <a href="#"><img id="educationBtn" src="assets/graduation.svg" height="24px" width="24px"  onclick="changeTo(1)"></a> 
                <a href="#"><img id="chatBtn" src="assets/message.svg" height="24px" width="24px"  onclick="changeTo(2)"></a>            
            </nav>
            <nav id="secondNav">
                <a href="#"><img id="homeBtnLow" src="assets/house.svg" height="24px" width="24px" onclick="changeTo(0)"></a>            
                <a href="#"><img id="educationBtnLow" src="assets/graduation.svg" height="24px" width="24px"  onclick="changeTo(1)"></a> 
            </nav>
        </footer>
    </body>
    <script>
        var homeView = document.getElementById('homeView');
        var educationView = document.getElementById('educationView')
        var chatView = document.getElementById("chatView")

        let views = [homeView, educationView, chatView]
        function changeTo(destination)
        {
            views.forEach((view, index) => {
                if (index === destination) {
                    view.style.display = 'inline';
                } else {
                    view.style.display = 'none';
                }
            });
            selectedBtn(destination)
        }

        function selectedBtn(destination)
        {
            let homeBtn = document.getElementById("homeBtn")
            let educationBtn = document.getElementById("educationBtn")
            let chatBtn = document.getElementById("chatBtn")
            let homeBtnLow = document.getElementById("homeBtnLow")
            let educationBtnLow = document.getElementById("educationBtnLow")

            if (homeBtn) homeBtn.src = "assets/house.svg"
            if (educationBtn) educationBtn.src = "assets/graduation.svg"
            if (chatBtn) chatBtn.src = "assets/message.svg"
            if (homeBtnLow) homeBtnLow.src = "assets/house.svg"
            if (educationBtnLow) educationBtnLow.src = "assets/graduation.svg"
            
            switch (destination){
                case 0:
                    if (homeBtn) homeBtn.src = "assets/house_b.svg"
                    if (homeBtnLow) homeBtnLow.src = "assets/house_b.svg"
                    break
                case 1:
                    if (educationBtn) educationBtn.src = "assets/graduation_b.svg"
                    if (educationBtnLow) educationBtnLow.src = "assets/graduation_b.svg"
                    break
                case 2:
                    if (chatBtn) chatBtn.src = "assets/message_b.svg"
                    break
            }
        }
        changeTo(0)
    </script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-analytics.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAw_s-SsnRQp44GoR7_PZjzocHCTaansfY",
            authDomain: "tech-mastery-academy.firebaseapp.com",
            projectId: "tech-mastery-academy",
            storageBucket: "tech-mastery-academy.firebasestorage.app",
            messagingSenderId: "205345673412",
            appId: "1:205345673412:web:d8970165489c414745b991",
            measurementId: "G-KLKCTD047P"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const auth = getAuth(app)
        const db = getFirestore(app);

        function showDefaultNav() {
            const firstNav = document.getElementById("firstNav")
            const secondNav = document.getElementById("secondNav")
            firstNav.style.display = 'none'
            secondNav.style.display = 'flex'
        }
       
        async function getAccount(userId) {
            const docRef = doc(db, "users", userId);
            let firstNav = document.getElementById("firstNav")
            let secondNav = document.getElementById("secondNav")

            try {
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) 
                {
                    const docData = docSnap.data();
                    const tier = docData.tier || (docData.accessLevel >= 2 ? "vip" : docData.accessLevel === 1 ? "guide" : "free");
                    localStorage.setItem("userTier", tier);
                    // VIP: full nav (Home + Education + Chat). Free/Guide: Home + Education only.
                    if (tier === "vip" || Number(docData.accessLevel) >= 2) {
                        firstNav.style.display = "flex";
                        secondNav.style.display = "none";
                    } else {
                        firstNav.style.display = "none";
                        secondNav.style.display = "flex";
                    }
                } else {
                    console.warn("No user document found; showing limited nav.");
                    showDefaultNav()
                }
            } catch (error) {
                console.error("Error fetching document:", error);
                showDefaultNav()
            }
        }

        onAuthStateChanged(auth, (user) => {
            const storedUid = localStorage.getItem('userUID');
            if (user) {
                localStorage.setItem('userUID', user.uid);
                localStorage.setItem('userEmail', user.email || '');
                getAccount(user.uid)
                return
            }
            if (storedUid) {
                // Soft demo: allow shell to load from stored session even if auth persistence lags
                getAccount(storedUid)
                return
            }
            window.location.replace("../techAcademy.html");
        });
    </script>
</html>
